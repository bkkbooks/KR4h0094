body:
  text: 雅頌正音巻五明劉仔肩編孫炎伯融金陵人寶劍歌寶劍光耿耿佩之可以當一龍只是陰山太古雪為誰結此青芙蓉明珠為寶錦為帶三尺枯蛟出冰海自從虎革裹干戈飛入芒碭育光彩青田劉郎漢諸孫傳家惟有此物存匣中千年睡不醒白帝血染桃花痕山童神全眼如日時見蜿蜒走虚室我逢龍精不敢彈正氣直貫青天寒還君持之獻明主若嵗大旱為霖雨題好溪圖送憲使黄繼先君乘馬望君來栝蒼下君乘舟望君來好溪頭好溪水生玳瑁魚好溪水生明月珠好溪水生青珊瑚使君來此月再樞惟飲此水無一需使君之清水不如臨别贈君青絲轡隨君馬頭行萬里相思之心有如水龍灣城龍灣城壯如鐵城下是長江城頭有明月月色照人心不移江水長流無盡時迎日詞鳯炙兮麟脯瑤席兮桂俎樂萬舞兮如雲吹笙竽兮龍二女干孑孑載以輿六蒼虬厯天衢雲霈霈兮夜未艾執長轡兮久相待奉使還途中聞東征捷音南來萬馬淨邊塵衘璧歸朝盡大臣城上玉繩浮婺女帳前銀甲擁天人出師已略扶桑國奉使須通析木津遂有江黄慕中夏可無書檄諭全閩贈黄鍊師留侯弟子有初平九嵗從師住玉京天與數書皆鳥跡家傳一劍是龍精瑶池桃子無消息海水桑田又淺清我為紫芝歌一曲夜深相答洞簫聲李克正一名頥豫章人送吕君采史北平八月烏啼海子橋南來使客下青霄雲埋石室丹書在日落延秋翠輦遙麟史未全歸聖代龜文猶得認前朝詞臣載筆需文獻莫遣囘車久寂寥送劉汝弼歸鄱陽楓葉江天爽氣髙石頭送子上輕舠遥看一鴈歸彭蠡秋水偏宜濯羽毛蘇伯衡平仲眉山人雜詩二首富貴毎多合貧賤恒見疎自我罷朝請於今四月餘平生交親者對之良可吁深情劇山海厚貌彌勤渠微君仗髙誼何以慰窮途豁達見肝膽亹亹忘其劬君雖今人居君乃古人徒還家信可喜還家亦可悲喜全骨肉親悲與故舊離呉越各異縣闗河復間之明日一樽酒何由共歡持念念不忍别戚戚臨交歧童子笑謂我悲戚亦奚為自非形與影安得長相隨為吕仲善題江岫圖尚書懷抱絶瀟灑揮毫往往淩董馬平生一筆頗自珍數尺新圖為君寫齊山遥接呉山青渌波萬頃孤帆征東風緑遍汀洲草總是旗亭離别情一在江南一江北别情浩蕩嗟何極正如江上之渌波縱有并刀那剪得當時已足令人愁而今况復隔羅浮掩圖却上髙臺望但見逺海連天流暮歸朝出與誰侣瘴雨蠻烟結悽楚斑枝花落鸚鵡飛苦竹叢深鷓鴣語題劉汝弼東源小隠圖東源山水好聞説似終南種黍都為酒誅茅小作庵過門人問字看竹客停驂亦有幽棲意遲歸我獨慙吕復仲善章貢人題桃源圖人蹟不到處鳥聲春晝閒桃花渾勝錦雲氣或成山仙子知名久劉郎何事還至今橋畔路猶聽水潺湲題東林小隠圖茅屋青山麓芸牕緑篠陰小橋通曲水疊巘出疎林門巷車塵遠桑麻夜雨深别來江海上誰與繼清吟次劉汝弼東蕭子所詩韻不見劉郎久相思愁緒多偶然得佳句頓若起沈痾春緑王孫草泥香燕子窠皇都同作客慰藉可能過題方壺蒼山秋意圖昔遊華蓋仙人掌萬疊芙蓉紫翠生猶記月明聞鐵笛人間無處著秋聲章貢聞柝翠玉樓前聞擊柝離情應向此中分遙知孤枕金陵夜還憶今宵月下聞唐肅處敬㑹稽人孤鴻吟美夏節婦冥鴻失其曹孤飛自嗸嗸嚴霜殺野草烈烈北風髙豈無雲間行肅肅齊上下顧之非吾匹吾匹久以寡生有孤飛影死有孤飛魂孤飛竟生死誓不入他羣陶誼漢生天台人送魏太守之官姑蘇東呉父老候麾旌皂蓋朱轓五馬榮名郡暫須煩魏相諸生久恨失陽城麟符剖玉君恩重燕寢凝香吏牘清指日徴黄下丹詔又看環珮入承明題嵩髙春曉圖嵩髙千仭青崔嵬倚空壁立何雄哉東瞻紅日海底出西引黄河天上來山君翠蓋弭絳節仙館瓊漿分玉杯我思從之不可得忽見畫圖雙眼開題詹吏部所藏方方壺畫方丈蓬萊海上山瓊林琪樹杳難攀玉笙倚鳯真仙下羽蓋驂龍帝子還縹緲遐蹤遊物外淋漓醉墨落人間九天歩武尚書履應與壺公接佩環湛上人鍾秀樓詩樓在四明東湖上百尺樓居聳碧霄天開圖畫足逍遙一㠶春雨來湖口兩岸青山落樹腰夜坐翻經香欲冷詩成倚柱酒微消東還擬遂登臨興慚愧無才趁早朝蕭執子所廬陵人劉子髙贈王明善依韻以和匡廬之山瀑布泉老子結社來何年林間經罷常隨鹿雲外樵歸或遇仙坐石有時巾掛樹焚香終日袖攜烟市南别有秋江水種得花開總是蓮緑筠軒為姚宰作緑筠陰陰翳牕户此是姚侯讀書處摇空翡翠晚宜人食實鸞凰曉相語稚子牽衣惜春露候卒編籬䕶秋雨何當便棄人間事抱琴走覔湖山住次荅劉汝弼見寄之什時汝弼客徳慶侯第春事今餘幾花枝已不多向人愁作客思爾積成痾威鳯翔髙漢慈烏戀舊窠平津東閣好早晚定相過張孟兼字同金華人春夜學宫宴集以春宵一刻直千金分韻得一字良夜款横宇髹几散芳帙秉燭延餘光焚蘭發清苾於焉衆彦并遽爾百憂失交深固金石情洽契膠漆睠兹蕭爽地際此休明日皇風既遠被遹觀四海一送宋仲珩省母歸金華朔風嵗華晏遊子去京國為言省慈母念念㤀寢食山川雖云遠何敢憚匍匐客懷畏别離令我忽悽惻我家子同里近在南山側相去一舍間况是素親識往者各家居朝夕弄文墨時常子來過暫離輒相憶自期韓孟交叩難惟籍湜子才實超邁字畫更竒特夙多臨池功揮灑雄筆力豈獨鍾張輩可作當代則比來接搢紳容度彌整飭恍如雜葩卉方春競顔色顧我絆微名窮巷歎偪反果非子慰藉何以洗胸臆笑語每移時欲去必曛黑固知千里外此樂不易得子今遽去我而我心轉䀌辭親四寒暑未得供子職近雖道路通半載無消息便當從子歸恨不生羽翼送朱仲雅經厯赴任浙江人生託交遊所貴在有道朱子西江賢一見相傾倒維時奉明詔編書共論討剪燭清夜間遂得罄懷抱越兹僅一載過從每情好今晨來叩門告别何草草為持紀綱地振理實繁浩西州風俗媮君去宜再造必若救瘡痍蟊賊期盡掃明主憂黎元到官須及早仲冬草木凋風霜肅晴昊遠别令人愁此心惄如擣送鄭叔車鄭子離襁褓所怙惟乃父父昔仕燕京半生去鄉土子家孝義門十世居同聚派衍白麟支望出滎陽譜庭常無間言禮或習鄒魯雞鳴起盥櫛合食聞鐘鼔雖當喪亂後遵訓仍厥祖我家故同邑匪聞目親覩况子吾素知才華足多取豁落義氣俱欬唾珠璣吐揮毫走蛟螭作賦凌鸚鵡昆弟既謂賢親鄰亦稱數久欲尋父去奈時方用武消息十年無道路滿豺虎近傳燕薊平不覺喜而舞聞父已南還恨不身揷羽歛衣即登途宵進江上艣忘食并兼程亦不避風雨逾旬及南京適父病將愈逆旅㑹面歡勝渴飲酥乳比鄰走翁嫗環視立如堵我時往相見政値日卓午挽之入客邸共談坐揮麈問言念父情情深話覼縷知子之所經跋涉甚辛苦春泥膏土脈停雲黯天宇朝行履濡露暮宿定林莽我惟純孝者往往見前古名同金石堅不與草木腐事親在娯樂奚必養三釡羨子為此行於世豈無補聞者大驚竒見者輒誇詡人生斯足榮何用效題柱是言良已解口荅頭屢俯陋予亦胡為問學本狂瞽三年事佔畢竟日拘訓詁環列紛叩難類敵張勁弩内顧實空乏畏彼捜林斧幸哉搢紳交脫略噲等伍或時卧養痾連月不出户今日子來别省墓亟東下為言奉父命明發河之滸此還暫當來窹寐歌陟岵聞之觸鄉思嘅嘆髀頻拊吾翁髮垂白不得躬幹蠱便欲從子歸致身學稼圃敝廬南山中風物詫韋杜桃李自滿蹊去天纔尺五但見桑麻榮豐年多黍稌昨宵夢先壠松楸長栩栩强起訴此懐喚僕買清酤春風吹栁條夜雨漲江浦勸子盡一觴聊以寫心腑予友陶本中與予先後來京予來時本中為奉新簿已二年適以公事至聚首一日即去嘗示予近詩數首曾未幾何有自江西來者則云本中死矣噫豈文字之交而遂絶於斯耶予交本中情好之篤雖弟昆莫過今死矣而欲不哀得乎因為哀詞一章書其詩後以誌予悲今晨開篋笥得子前日作攬之不忍看但有清淚落昨者客來過云子已㝠漠始聞罔所信終乃大驚愕飯食不能飡使我懷抱惡慟哭天為愁春風亦蕭索去年見子時大雪被城郭嵗晏復東西彼此歎飄泊何期聚散後生死竟難度緬思故山日文字得酬酢或時中夜舞擊劍起揮霍自期古人儔流俗已脱略焉知出處輕身世隕風籜百年金石交一旦付綿邈重山烟草深白骨定誰託抆涕一題詩聊踐平生約漫興棃花半開夜雨催無奈李花如雪堆門前美人不見來東風楊栁吹千迴青驄驕嘶金鞿銜美人二月裁春衫江頭麥秀青蔪蔪西湖放船開錦帆義門鄭仲舒先生得請歸浦江予於先生同里且親故賦是詩情見乎辭矣鄭公去年離北平束書抱病來南京城隅解后喜且驚開顔握手言再生自從南北屢搆兵日夜悵望鄉闗情幾囘寄書鴈南征中心摇摇若懸旌苦遭喪亂百病嬰客邊囊槖一旦傾此來四顧徒㷀㷀豈料吾子與合并我時聞之涕泗横况公素有文章名居官勝國職最清經筵之擢轉庠黌及當玉署已宦成又為奉常典粢盛人生際此自足榮但恨白髮已數莖懷哉屈子全忠貞誼與日月同光晶願言夕飡秋菊英佩明月璫紉茝蘅懸河之論春雷轟使旁覩者顔發赬索居半載畱帝城坐聽夜雨哦寒檠眼前倐忽時變更春風一見衰草萌公家孝義好弟兄遣兒千里來逺迎乃今得請荷聖明身若揷羽乘風輕過門云别明遂行開船要趁蒸雨晴夜久不寐視長庚長庚欲落鐘鼔鳴庭樹喔喔聞雞聲蒯緱起舞冠絶纓公歸我愁絲亂縈亦有夢寐懷先塋如過吾父款柴荆為言恨不同趨程終當早晚乞歸耕蓮房聯句宋璲張孟兼髙啟露冷鏡湖秋宋璲波凉練塘曉盤翻緑雲稠孟兼錦破朱霞少新苞顆微綻髙啟餘葩莖尚嫋痩繭綴寒蠶璲尖喙啄青鳥下唯玉龍眠孟兼中有瓊絲裊擎重柄欲折啟含深睛尚窅璲孤懸類覆杯孟兼雙立疑擢表啟初成欣雨滋孟兼漸老怯風掉啟多子同根榮啟獨婦專房悄璲粧卸失娉婷啟歌来逢窈窕璲剖心效諫忠孟兼並頭呈瑞兆啟褭蹄密竅剜璲魚目微光皎啟珠珥落槃多啟瑶軫貯囊小璲空實外莫辨甘苦中自了啟剥淺星滿池採盡香餘沼啟雕筵飣戢戢玉虫攢擾擾送看出小艇薦喜對清醥孟兼新嘗勝江芡遠覔迷水蓼褰芳想夏初啟感物傷秋杪孟兼聊兹發呉詠一笑烟水渺璲北山草堂草堂卜築近嶙峋怪石蒼苔迹未陳澗瀑亂鳴前嶂雨山花遲發半岩春每逢過客畱題壁自有居僧為卜鄰松下茯苓今亦大可能謀食樂終身金華洞天洞天萬仞落空翠神仙何年上青霄蛟龍已去荒窟宅雞犬無聞遺鼎瓢冰湍洒洒暗猶落巖雪陰陰春不消我欲乘風問生術林間黄精深雨苗登聚寶山分韻得春字蹤跡憐身拙登臨縱目頻江山如好客花鳥故餘春落落行藏異悠悠嵗月新數莖初白髮朝夕為思親春日遊鍾山以溪囘松風長分韻得長字訪古來鍾阜尋僧問草堂千年猿鶴靜一逕石林荒泉落春冰細梅畱臘雪香鄉心憐薄暮矯首碧雲長髙啓季廸姑蘇人聖壽節早朝天啟聖圖昌流虹叶夢祥飛龍起江左戰馬放山陽宫栁垂閶闔仙桃熟建章遠人陳貢篚近侍挹爐香金鏡千秋籙瑶池萬嵗觴小臣歌拜手舜日正舒長甘露降宫庭栢樹和氣融為液中宵降碧天光漙髙栢上瑞發内庭前見日朝還泫經風晚盡堅芳穠蜂蜜滑的蚌珠圓厚澤歌難喻沈痾飲易痊願言推聖徳濡沃遍周埏擬古四首纂纂牆下李芃芃陂中麥浩浩望遠途悠悠思行客客行嵗已盈紆鬱傷我情始知失羣鴻不若求友鸎登山知天髙臨流識川阻不遣懷同心那知别離苦别離不可久寂寞不可守自傷紅顔子相思成皓首朝日如不晚行人㑹當返嵯峨雲間樓俯視層城陰綺户相洞開清飈拂羅襟上有離居婦哀歌撫絃琴不知中怨誰掩抑一何深初為郢中唱再奏邯鄲吟不惜努力歌寫作絶代音風吹落君耳萬里知愁心曲盡思寂寞青天日西沈安得化彩鳯飛去巫山岑美人一相見遺我白玉環上有雙雕龍遊戯在雲間持此感深意佩結無時閒玉以比貞潔環以明不絶雲龍永相從誰能使離别明星爛東方北斗亦已旋獨宿悲夜徂空牀藉蘭荃雞鳴整環珮思奉君子筵君子行未歸新粧為誰妍意疎覺去遥咫尺越與燕含情乏彤管何以寫中䖍君如綆上瓶妾如井底泉不垂汲引恵澄瑩徒終年堂上歌行堂上歌歌南山主人為歡仰客顔翠帷夜巻出兩鬟移樽更飲花樹間花樹間有明月客不醉歌不歇贈金華隠者我聞名山洞府三十六一一靈蹤紀真籙金華秀出向東南遠勝陽明與勾曲樓臺縹緲開烟霞天帝賜與神仙家靈源有路不可入但見幾片流出雲中花子房之師赤松子三千年前亦居此飛蹤恍惚誰解尋謾説至今猶不死松花酒熟何處遊瑤草自緑春岩幽羣羊卧地散如石老鹿耕田馴似牛聞有隠君子廼是學仙者自從入山中不曾到山下世人莫識其姓名以山呼之不敢輕樵夫忽見苦未識只疑便是黄初平嗟我胡為在塵網遠望髙峰若天壤茯苓夜煮儻許飡鐵杖來敲石門響孫蕡仲衍廣東人期羅浮蕭鍊師不至石室松桂秋凉風滌殘暑柴門敞空曲曠夕懷仙侣巢笙久不至鶴馭今何許朗月流清輝山中幾延佇寄琪林黄道士雨絶天景佳前榮樹光緑遙憐採芝侣遠在春山曲琴歌久已斷酒賦何由續有約今夕同開樽掃茅屋南園歌寄王河東彦舉昔在越江曲南園抗風軒羣英結詩社盡是詞林仙南園二月千花明當門緑栁啼春鶯羣英絡組照江水與予共結滄洲盟滄洲之盟誰最雄王郎獨有謫仙風狂歌放浪玉壺缺劇飲淋漓宫錦紅青山日落情未已王郎拂袖花前起歡呼小玉彈鳴箏醉倚庭梧按宫徵哀絃泠泠樂向終忽看華月出天東裁詩復作夜遊曲銀燭飛光如白虹當時意氣淩寰宇湖海詩聲萬人許酒徒㪚落黄金空獨卧茅簷夜深雨分飛幾載遠離羣歸來城市還相親閒來重訪舊遊處蒼烟萬頃波粼粼波粼粼日將夕西風一葉淩虚舟猶可題詩向青壁羅浮歌寄洛陽李長史仲修亭亭西樵峯宛在南海湄日華麗仙掌影漾金銀池我昔扁舟縱長徃淩風浩蕩烟霞想幽尋更欲探神竒復向羅浮事仙賞仙家三十六洞天羅浮夐與滄洲連丹霞射影四山靜羣真環珮來翩翩蘂珠之峰數千丈君時與我縁蘿上水簾直下飛晴虹萬壑天風度流響山中劉郎司玉臺仙書授我琅函開心如明月炯虚照身與浮雲同去來此時㑹合那能再塵土分飛忽三載我行奏賦登金門君亦乘軺度淮海淮海迢迢烟樹深相思嵗晚結愁心晴天萬里碧雲遠何由一寄還山吟山中洞房春寂寂山中之人長歎息松花酒熟人不歸瑤草東風幾囘碧宋璲仲珩金華人採桑曲桑芽露春微似粟小姑把蠶試新浴素翎頻掃細於蟻嫩葉纎纎初上指朝採桑暮採桑採桑不得盈頃筐羞將辛苦向姑語妾命自知桑葉比家中蠶早未成眠大姑已賣新絲錢岸上何人紫花馬却欲抛金桑樹下春夜詞春閤凝溫翠雲繞五色流蘇垂嫋嫋美人自脱玉花鈿子帳香棲緑衣鳥銅鳬漏聲夜初墮紅暈搖晴燃蠟火欲寄相思無鯉魚月色棃花愁朶朶謾將軟帶結同心開簾微步鞦韆陰芳眠未穏鴛鴦枕早樹重重啼翠禽寄章允載兼柬項思復憶昔到京畿與子寓官廨一見即相驩不翅舊交快維時困道途驅車久行邁忽逢㢮擔初欣若身脱械握手坐氍毺軟語慰疲憊情投比黏膠意愜甚搔疥項君數過予滯下喜方瘥三人互談噱何殊合糾繣驂鑣出游衍古蹟探竒怪路入青蓮宫駐足聽梵唄薄晚始旋邸傾倒形忘瘵周詳論書譜從容説詩派凡習尚浮華遺音日已壞作者固繁夥咸韶混夷韎瀾倒并波隨疇能捄危敗顧予樗散材頻年處卑隘枘鑿乖方圓甘遭世俗賣人將競嘲譏子乃敦教誡苦言加箴規黙黙使心解酒酣示新篇詞源極滂湃却類任公子投竿下羣犗應知藝嘉禾薅治絶稊稗讀之神駭驚秋蛩罷嘶喝政圖藉薰陶别還隔遙界欲叩寢食安但復占爻卦浦汭守衡茅無從豁矇聵譬諸鐵在爐伊誰鼓風鞲况乃患沈痾軀命猶纎芥侵尋閲暑寒孱弱乏剛夬精神盡凋耗靣目多腫噲布衾暖閤眠藥貼晴簷曬年來獲告瘳書齋仍掃灑猿鶴亦爭慶似索烟霞債綴賦詠雕蟲攻篆學垂薤有時看飛泉四山寂無㕦思取古遺經一覽適炙嘬蘭膏繼日晷矻矻警昏懈視已常欿然進業慙質䪥志須成絲枲未能脱菅􅀢篤信宴安中懷毒劇蜂蠆蚤暮自深省此語諒非躗近聞子亦歸親朋樂情話千里感貽書殷勤馳一介而翁幸康彊愧缺牀下拜執簡立臺端百壬不敢噫道迷竟莫前動若飛翮鎩嵗月無停輈季秋倐已屆籬菊傍雲肥江山日如畫軒車幾時來夜雨一燈掛明徳正可崇相期各云勱劉仔肩汝弼鄱陽人遊仙詩二首登冶城山作示張𤣥德道士戈仲京徵士神州闡佳麗冶城閟𤣥虚琳宫際霄漢綵閣臨天衢肅肅神響集泠泠祥飈俱要眇引鳯吹飄颻曳霞裾陵陽與服食安期共興居左覽金匱記右抽鴻寶書鍾山足靈草涎池多白魚永言駐精魄為結羲和車靈境啟赤縣丹臺麗璇霄虚櫺洞宏敞飛閣淩岧嶤倒景返曜靈𤣥霙㪚祥飈鶴駕儼驂馭霞佩紛招搖青鳥引翠蓋瓊娥合仙韶飡和豈殤顔飲玉皆松喬上壽安足喻千齡等崇朝脫屣九垓上後視三光凋贈張時敬還荆南隨牒適荆土倦遊滯京畿謀生苦拙訥事與心恒違朋儔一疎濶山川復間之音問曠莫達何為遽來斯世故有變遷嵗月成推移顔藻減丹渥衣塵化為緇稍欣披雲霧復覩聨珠璣意愜苦不早情深發彌遲夕語厭促漏晨遊恐斜暉論舊已慨歎况乃重乖離春草滿南浦時花匝郊圻乖人無為歡感物悲路歧昔别已三載重來復何時幸兹書軌同逺邇無不宜逸足志四海羇禽戀故枝言念屬繁翰聊以叙所私登北山薄言出東郭縱步陟北嶺油雲冒崟㠋寒松雜修挺林翳景若暝谿迴路猶引崇基擬素志澄淵鑑清影遵險既易常臨深亦逾謹朋遊並登眺妙趣心獨領寄想烟霞濱超然欲歸隠題朱氏篁谷蘭澤蔽宿草椒丘無餘芳睠兹淮陽谷懿彼多修篁雨葉偃翡翠風梢亞琳琅幽人感嵗暮托蹟同雪霜曾謂白駒至載覩鳴鳯翔神慮紛蕭散遐心信徜徉寤言契斯樂永矢不可忘題國子生桑懋思勤齋巻後去日忽已速來日亦不停念彼自修士惕然動中情宴安豈可懷華耀非所營升堂服師訓旁構羅羣經投迹謝塵軌焚膏繼朱明於焉肆探賾所冀業日精竊求顔生志載慕殷湯銘夙夜茍自朂此篇其可徴春日與李二文學遊城南浩蕩闗河逺周流嵗月新獨醒愁對酒多病怕逢春梅栁南城路鶯花紫陌塵若為聯騎出為爾謫仙人公子玉雪諸公子聨翩出鳯城栁横絲障緑花擁繡衣明玉勒迴香騎金丸落小鶯晚酣邀上客歌吹向蓬瀛得鄉書鄉書不忍看憂緒每多端鶴髮慈親老鶉衣稚子寒園田多撥棄耆舊半凋殘朝夕東歸念雲山正渺漫别墅晚晴與鄰叟久立郊原初雨歇散步出荆扉落日在髙樹凉風生客衣佛香僧舍近江影塞鴻飛亦有南鄰叟忘言相與歸夜讌上相勲庸盛羇人㑹合難昔曾陪劍㦸今乃厠衣冠酒向佳人醉花隨錦障看篆香琱鴨換銀甲小箏彈内屋開新色重簾䕶薄寒㫖肴呈海陸妙舞播椒蘭賢達儕梁苑才華擬建安任情從客狎劇飲樂杯乾門第青春迥星河五夜闌歸鞍拂華薄零露已漙漙春曉曲紫絲複帳流蘇結雲母屏風疊香雪門前嬌栁乳鴉啼暖漏丁丁曉將徹花枝入簾紅尚小蘭露著衣香不歇江南行客歸未歸芳草春風滿城闕鳯臺吟贈王道士我昔慕仙侣東遊求蓬萊朝辭黄鶴樓暮憇丹鳯臺鳯臺髙髙入窈㝠恍若𤣥圃開神京陽烏顧兔耀光彩銀臺金闕同崢嶸其陽生梧桐其陰出醴泉榮光休氣集九仞鳯凰一鳴三千年客有王子晉聞之棄緱山時來鳯臺上吹笙月明間我將從之弄明月了然便覺心神閒且為鳯臺吟復和鳯臺曲願隨鳯臺人飄翩跨雙鹿昨日麻姑海上來為言海宇無氛埃蟠桃再結金丹熟相與翺翔淩九垓荆南江晚眺有感沙頭寂寂晚維舟詞客重來感舊遊江上夕陽諸葛廟雨中芳草仲宣樓天連錦水來春色雲暗襄陵起暮愁囘首可憐梁甫意一官牢落向南州題李宗伯所藏趙仲穆墨蘭瑣牕春晝寫蘭亭獨愛王孫骨氣清何事花前雙蛺蝶飛來羅袖最多情望闕口號閶闔排雲寶殿開千官鵷鷺早朝囘不知誰獻王褒頌得奉君王萬夀杯雅頌正音巻五
