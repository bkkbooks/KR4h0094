body:
  text: 雅頌正音卷二明劉仔肩編汪廣洋朝宗髙郵人大祀維皇建有極庚庚歲時康二氣迭敷宣允若重雨暘季秋成物際報祀禮有常掃地事明薦穹廬列周行鼓鐘宿在縣玉帛粲成筐陶匏湛醴齊大登具牛羊匪侈禮物豐貴在誠意將今夕乃佳夕天髙露氣涼微雲散暗靄衆星羅縱橫濟濟百執事念兹靡或忘金門少焉闢和鸞鳴聲揚旗常紛左右燔燎彌耿光宸旒儼祗肅對越位中央八音唱律吕佾舞節趨蹌所舉靡不備所及靡不臧川嶽永流峙風雲倏低昻神靈符肸蠁鑒假達羶薌錫福何簡簡降福何穰穰既灌􅀈雍徹精神合一堂願祈億萬年禴祀及蒸嘗載歌周頌篇庸擬被樂章大饗諸侯謹述職方伯敬來同後世尚斯典往古有遺風維兹獻嵗始大鈞妙化工川泳雲飛間罔不被薰融至尊垂衣裳雋髦蔚景從土宇日已廣民物日已豐匪文莫附逺匪武孰成功不有勸賚美恩意何由通乃命行大饗禮數極雍雍三公相左右百辟序西東祥飈臨寧來旭日當天紅嘉殽薦修脯旨酒酌春缸舞干何于于擊鼓何隆隆儷曲被朱絃清磬和考鐘尊卑同一歡遭遇靡易逢豈惟浹和樂厚在肅儀容自昔周室時君臣期令終頌歌咏鳬鷖錫豫賦彤弓其慶何綿綿其音何渢渢所以億萬載慨念斯無窮小臣奏雅章稽首對九重壯遊奉簡諸閣老壯遊吳楚外揚舲遡天風名山浮紫翠大江走蛟龍厯覽思超越毛骨生氷雪脫巾漉清湍舉手弄明月明月懸青銅古人難再逢牛渚委陳迹蛾眉斂愁容九華舞傞傞窺見滄溟底小孤立亭亭徘徊女蘿裏流宕鄱湖湄巒峰愈出竒半空搆樓閣峭絶挂猿獼放意恣陶寫援筆灑秋泚神怪動窈冥魚鳥覺欣喜路逢丹丘生來自赤霞城麻姑後飛舄子晉迭吹笙湖光瀲灔開雲壓葡萄緑狂引黃金罍嘯歌紫芝曲左蠡素相得當湖忽見迎揚瀾平一掌中有黿鼉行振衣扳鶻巢捫蘿踐苔石崖氣凌空青松花墜階白舉首匡廬下調笑煙霞間屢會復屢往今往幾時還叢蘭被路蹊芳草縈澗谷長飈和鳴鶴迸泉驚飲鹿須臾見五老邀我山之陽授我長生訣兼遺洞玄章問我從東來迢遙泛鯨波三山得無恙十洲近如何旁招廣成子俯挹山中老鯉魚躍天江鵷鸞下天沼待以青精飯勺以白玉漿乖龍左耳潤吠犬靈苗香渴烏漸斂翼拭目增晚碧朵朵金芙蓉慿虛落胸臆西南挺竒異江湖馳偉觀披衣古蘭若丹堊耀巑岏嘗聞逺法師堅坐東林下還許陶淵明共結白蓮社又聞李太白酷愛香爐峰長安卸塵鞅欲歸巢雲松往事既云逺顧我復來此濯泉坐繁陰下洗巢由耳緑髮雙青童采芳留我行我行欲不行月髙猿夜聲西山招我遊明日過湖水笑隔南浦雲遙謝數君子山有湫山有湫雲蓊鬱風颼飀近在章貢之陽崆洞之幽湫波冰浸石骨底陰森樹木相綢繆上有千尺之翠壁下有百尺之蒼虬神靈鬼怪變恍惚驅逐雷雨無停留今年五六月稻禾乾欲死嗸嗸章貢民束手坐待斃嗟哉兵困餘何以復加此山湫有靈聽我言爾虬宅兹久蜿蜒安危同境憂樂然寧不一出為我民周旋坐令膏澤遍四海力挽凶嵗成豐年山有湫生雲煙魏觀杞山江夏人夜宿江夏水驛將往衡湘留贈親友茅屋江聲合松舟月色遲把杯頻就席剪燭共題詩攬瑟清湘夜聞簫赤壁時美人千里外迢遞寄相思贈友東山偶為蒼生出南紀來分聖主憂爭覩台星臨左轄炯如霽月麗中州梁公引士賢才出韋相傳經弟子留正論每聞關治體綸音端為老成求朝挹天香詠紫微夕馳清夢繞黃扉國風正頌周公化霖雨重徴傅説歸天上皇猷增黼黻人間元氣屬樞機江南民俗今淳厚政教從來願不違吳琳朝錫齊安人奉命徵賢道出桂州纁帛徴賢出帝畿殊方歲晚謾驅馳撞家茅屋依林結賈客鹽車下坂遲雪片竟虧滕六巧梅花不負少陵詩何當俊乂幡然起同向虞庭看鳯儀廣南舟中嶺海重瞻宇宙新民風尚似古時淳蜒人浮宅一舟小蠻女汲溪雙甕勻冬暖有花飛蛺蝶天荒無筆寫麒麟兹行猶幸諸君子相約同看上苑春開化道中重岡狹路倦登臨喜見溪流華步深楊栁樹邉舟小小海棠花上雨沈沈一春王事過三月千里家書繫寸心無補盛時縻好爵樗材只合老雲林煙波亭漢水連天濶江雲護曉寒青青山幾點最好倚欄看陶凱中立天台人君道篇龍飛應景運居中攬乾綱百川宗巨海衆星避太陽股肱者誰伊與傅爪牙者誰叔與虎玉筍班中列衆賢金馬門中登碩輔梧桐生鳯凰鳴四海為一家於穆皇風清修禮樂正綱紀明后復無為詒謀千萬祀贈琴士施彥昭君不見鳴琴無賞音伯牙絶絃仍破琴又不見斫琴無良工焦琴終為爨下桐大江之南多好山孤桐往往生其間武陵城中百萬家斫琴施氏良足誇嗟哉施氏之外無復人桐樹枯死終為薪今人好尚與古異人間雅琴多棄置雅琴苦少秦箏苦多嗟哉施君將奈何長平戈頭歌長平野人鑿地得古戈上有欵識字嵗久俱滅磨惜不能如豐城古劍射牛斗吁嗟戈兮奈爾何但見青銅凝寒暮煙紫月黑山深夜飛雨恨血千年猶未消荒郊夜夜啼寃鬼當年趙括輕秦人降卒秦坑化為土嗟哉趙亡秦亦亡落日荒城自今古摩挲爾戈一問之令人為爾生愁思何不以爾為鐘鐻何不以爾為鼎彛吁嗟戈兮徒爾悲爾今還當太平世人間銷兵鑄農器願壽吾皇千萬年終古不用戈與鋋閨情妾住金陵步郎上西江船光陰似流水安得長少年曾魯得之新淦人贈黃道士還九宫山我家羣玉山南陬君居蒙頂最上頭相望欲識嗟無由搖搖心若風中斿君從少年慕逺遊誓驂笙鶴仍丹邱冠星佩月露為裘口誦赤玉靈書謡摩斥八極隘九州後天不老三光凋故鄉臨睨毋停輈下視起滅如浮漚九宫山髙明翠虬真牧之子世莫儔君居其間業焚修五十餘載無悔尤翠華昔駐鸚鵡洲承恩召對黃鶴樓敷陳屢沐天語酬大官醉以白玉甌去年弓旌復旁搜麻鞋徑入朝冕旒神皋繁麗不肯留日夜稽首還山求山中之人寄書招雨餘黃獨抽新苗芝草琅玕弄春柔不歸負此岩壑幽龍江送别情悠悠鄉人歌作商聲謳鄭淵仲涵金華人次韻宋學士見寄四首涉江采新緑攬之不成歡我心獨何苦臨風屢彈冠無心問明月有懷如長川且歌擬招辭采芝向商顔商顔有神芝豈徒樂苦飢可以起沈痾可以滋容輝乞身在強健行樂須及時願言賦歸來慰我朝夕思夕思苦長夜欹枕聽征鴻征鴻為稻粱南北何憧憧相隨有流水莫比情無窮起來步簷下倚遍青青松松月流光精照我雙瞳青千里共徘徊兩情正交并取琴彈别鶴弦寒不成聲誰知揚州地亦隔牛女星宋學士贈詩用韻以謝我憂何日消正若塵土積心隨道路長目斷山川碧依依江東雲卷舒度朝夕皎皎海底蟾升髙吐秋色雲月會有時猶可慰寥寂我人胡暌違不得從公側年來性踈拙百病身已瘠鳴鸞入仙洲孤鳯憐影隻灑淚向公言為我重悲惻楊訓文克明維揚人春日遊真常觀攜琴偶獨來尋幽入芳樹林深鳥聲寂坐久淡忘慮振衣下崇岡斜陽在歸路送朱煥章稅使得歌字歸鴻起天末殘雪迷山阿美人事行邁離思隨滄波華輈待明發祖餞冠蓋多旭日照芳席微風動鳴珂征商良自古報效將如何終當期令名四野咸謳歌周元善以蓬山自號為賦蓬萊山色鬱嵯峨上有神仙醉後歌瑤草緑湥知嵗久琪花香暖得春多虛勞謝叟乘舟問曾見秦人採藥過獨有周君會中意不須辛苦涉風波賦得鳯凰池送李教授歸河南鳯凰池上送歸船渺渺清波接逺天沙觜雨添蒼色潤溪毛春濯錦紋鮮來儀宛似聆韶樂應瑞何殊集潁川從此揚帆看君去薇垣明日聽傳宣題曹子益可竹軒揚州富豪十萬户盡買金盤芍藥栽子獨幽棲一軒竹手移瀟灑數竿來秋聲入枕回孤夢寒鶴隨人啄細苔我亦平生愛蒼翠幾時解佩出塵埃寄石仲文故人别後復如何不寄新詩到薜蘿賈誼書成何日上張衡愁比向時多江城木落霜連地澤國天寒水不波重約明年秋八月紫薇花底共鳴珂水雲軒詩為張志道賦華軒結搆水雲鄉中有髙人逸興長睡起波光搖簡册坐來嵐氣潤衣裳青山常立飛甍外白鳥時過釣艇傍相對紛紛總詩思豈應重問舊滄浪答山堂上人見招海氣寒欲雨空齋坐寂寥逺煩童子至深負老禪招髙竹青當户香醪緑滿瓢好留詩興在相與醉明朝贈友與子分攜後星霜二十年重逢驚老大惜别更留連花落春江雨鵑啼緑樹煙幽懷浩難寫愁墮酒尊前滕毅仲𢎞鎮江人啓行虞卿雙白璧魯連千黃金重輕豈在彼在此方寸心聲名落天地輝采流古今沒齒無一稱終將愧朝簪晨趨螭石下夕過鸞閣陰兹焉復申命載道荆山南間中牧龍媒韝上馴鷙禽豈徒飽芻肉神俊令銷沈揚舲大江水弭節春樹林髙髙向明月聊用開吾襟靈應祠吳船何汗漫周道正倭遲雪涌蝦蟇焙花深石馬祠焚蘭瞻玉座析羽動金支靈降雲如綵巫歌月在帷林髙懸薜荔洲近被江蘺小駐娛今夕前驅恐後期嘏傳唯好語行邁藉蕃禧願沛霑民澤微涓敢自私三閭大夫祠襜帷褰薄暮回飈吹白雲下有棲神宇慘淡臨江濆行吟既不返遺響寧再聞緑榮並丹綵婉爾含清芬沐芳正冠佩酌水炷夕熏長歌靈谷應春思何紛紛願言卜瓊茅巫咸不可羣渚宫望儀羽再拜雲中君秭歸即楚王臺舊基為新城春風夔子國落日楚王臺江繞西陵下雲從上峽來壯遊今已遂幽思獨難裁關塞猶戎馬吟邉首重回采石騎鯨仙人海上歸至今草木猶清暉千山落日送樵笛萬里長風吹客衣春空蛾眉浮翠黛夜光犀渚沈珠璣神遊故國應過此髙冡臨流知是非周湞伯寧金陵人始發建鄴登龍江山祠感懷有作去國思舊遊尋山發幽眺遙淩天門石恍對臨海嶠神關列雄鎮粉堞抱遺廟天水逺自空雲霞近爭耀客行始多感世事紛難料同俗豈素懷趨時固殊調既為達士恥復被逐臣誚塵淚應言垂江容帶愁照秋陰散微翳炎景扇餘燎行矣庶無欺忠信將可劭池口舟中見九華山貞履無素期勞生意恆窘誰云戒戎路曾是返初隱水宿淹長晷山行阻修畛縹眇對雄標巑岏發竒蘊岩回氣如燌峰去勢猶引刻削冠青蓮雕鏤矗丹筍嵁霞上斑剝石乳下碖硱山鬼從文狸淵靈悶玄蜃眷言志藜藿未遂採芝菌觸事情已悲懷賢迹俱泯濳吳愧梅福去汶羞閔損人德險未夷天道明可準皋蘭豈徒歇岩桂芳未隕嵗暮山中人結言候歸軫賽小孤廟育秀凌華嵩標竒奠淮楚陽闢啓神關陰沈開水府渾渾聚商舳淵淵聞戍鼓陳瑟會安歌傳芭紛代舞椒漿既芬潔桂棹方容與日暮懷歸情含睇望修渚題營丘山房周室疏封後齊疆啓國初流風看後裔形勝想遺墟水合如分魯山回似入徐路疑登載處溪擬釣璜餘紅樹臨關近青蕪際海疏徵賢方奏頌何暇賦間居寫江岫春晴圖汀洲碧草生鳬鴈動春聲莫上髙亭望能傷送别情吳志淳主一豫章人春日遣懷二首四顧山河歸一統明君文德似唐堯幽燕地濶干戈息吳楚春深雨露饒中古衣冠存舊制南來律令有新條腐儒擊壤茅簷下為擬謳歌答聖朝貧病相兼氣未舒田園雖少樂耕鋤為儒已入他州籍垂老頻收故國書夜雨湖山人去後春風門巷燕來初潘生喜遂間居志阮籍從教禮法疏夏日園中清暑二首青山地僻車馬稀十載倦遊樂式微傍溪卜築靣流水拂石展簟消炎暉老翁過從就蔬食幼女補綴成絺衣西亭去家苦不遠日暮共逐漁樵歸東湖萬頃波渺茫人家多在雲水鄉竹枝調短阿家女桃葉歌長何處郎疏林歸鳥度花影近水流螢浮竹光東山坐待月已出不覺涼露沾衣裳春遊二首湖上輕風吹栁絲湖邊細雨濕花枝百年總有三萬日一日都來十二時杜老每尋崔氏宅山翁偏愛習家池乘間取醉真吾事度水看花也自竒山中蘭麝香滿林故人清遊能遠尋燕來已覺社日近寒退始知春意深山光入眼凝遠翠華影到湖生夕陰慈雲咫尺不一去薄暮還家空復吟雅頌正音卷二
