body:
  text: 雅頌正音總集類提要臣等謹按雅頌正音五巻明劉仔肩編仔肩字汝弼鄱陽人洪武初因薦應召至京集同時之詩為此書上自公卿下至衲子凡五十餘人而仔肩所作亦附焉用王逸徐陵芮挺章例也所選之詩毎人寥寥數首葢是時諸人之集皆未成編隨得隨録故未能賅備然明初諸家今無專集行世者頗藉以畧存梗概其時武功初定文治方興仔肩擬之雅頌固未免溢美要其舂容諧婉雍雍乎開國之音存之亦足以見明初之風氣也此本猶洪武時舊刻歲久刓敝頗有糢糊佚脱之處無别本可校今悉姑仍其舊焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀雅頌正音原序雅頌正音者鄱陽劉仔肩之所集也其曰雅頌者何雅則燕饗㑹朝之樂歌頌則美盛徳告成功於神明者也今詩之體與雅頌不同矣猶襲其名者何體不同也而曰賦曰比曰興者其有不同乎同矣而謂體不同者何時有古今也時有古今也奈何今不得為古猶古不能為今也今古雖不同人情之發也人聲之宣也人文之成也則同而已矣然則曷為謂之同江河沼沚有不同也水則同陵巒岡阜有不同也土則同人動乎物有不同也感則同趨其同而舍其異是之謂大同曷為知其為大同期歸於道焉爾歸於道焉爾者何世之治聲之和也聲之和也奈何天聲和於上地聲和於下人聲和於中則體信達順至矣體信達順其亦有應乎曰有三秀榮鳳鳥見龜龍出騶虞至嘉禾生何往而非應也應則烏可已也烏可已則有作為雅頌被之絃歌薦之郊廟者矣是集之作其殆權輿者歟洪武三年十二月十五日國子司業金華宋濓序
