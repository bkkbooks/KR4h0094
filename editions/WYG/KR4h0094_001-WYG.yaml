body:
  text: 雅頌正音巻一明劉仔肩編陶安主敬姑孰人石假山詩世上好山如好人偃傲不肻來相親是何峯巒落几案數寸氣象排蒼旻我聞好山芙蓉三十六從有鴻濛露巖谷一宵神運霹靂斧但見二十四峯青立玉翩然飛去十二峯來向君家伴幽獨忽遇雲間騎鶴侣為言此事非誇詡更有仙家十二樓化作游龍渡江去硯屏時映一拳小萬壑千嵓共昏曉天地骨含千古清收拾精神不為少洞天兩竅秘莫窺虚㝠眇漠涵天池須彌亦向芥子納靜中觀妙生神竒幽人拂拭愛瀟灑掌握烟霏恣陶寫着屐不勞追謝公山同心㑹忘真假贈劉汝弼赴京珊瑚生海底淵深邈難致人世曾幾株遂作希有視鄱陽古大邑文物淵藪萃干戈一紀餘衣冠日陵替際此維新朝四方延俊乂劉君孤鳳凰文彩無與儷才難古所歎寥寥不三二一夔作大章雖少已足貴選堂執權衡詞藻賞瑰異爵禄被光華名節勤砥礪孝親在顯揚報國朂忠義薦才吾所職至珍得非易掇此芝蘭芳移栽上林地南風天宇髙目送青雲驥胡翰仲申金華人雪山亭詩為夏官章季明作呉山跨東表稜層擬西域上有瓊仙館下臨萬家邑炎濁自兹逺髙寒去天尺渾渾太素開肅肅𤣥霙積山合葱嶺勢水散銀河色鮫室亘湖曲星橋少人跡僧歸天竺寺漁傍蘇堤石飄颻楚樹春洄沿越江夕爽氣浮清都澄暉落瑤席觸物各有會撫時詎非昔宇宙良悠哉人生苦形役五年間音容相見抱衰疾手拂三素雲送爾雙飛舄大明當中天光被南與北眷言羲和氏為紀甲辰厯送吕君采元史北平又見陳農去遙臨析木墟山川遊幸後文獻亂離餘備極傳聞異歸從直筆書百年殷監在盡獻玉階除劉基伯温栝蒼人有懷龍門先生謾書奉寄以寫别懷龍門宋景亷號有美一人兮美且都青霞為衣兮白雲為裾被秋蘭兮佩珣玗泰和與遊兮中黄與居瞻望弗及兮芳嵗其徂山髙水㴱兮道阻且紆安得羽翼兮致我與俱有美一人兮美且仁自我不見兮不知幾春仰𤣥穹兮睇參辰為合為離兮孰識其因青㝠無階兮江海無津安得羽翼兮致我與鄰有美一人兮在山中蒼眉黑鬚兮玉雪其容飲沆􅒭兮食紫虹澡石泉兮灑清風邀初平兮從赤松超逍遙兮樂無窮安得羽翼兮致我與同詹同同文江夏人張氏白石山房詩浦江有名山白石如積雪玉氣亘中天龍湫無六月於兹隠君子結屋依翠微讀書日平樹看泉風滿衣誰謂野鶴姿從心自飲啄一落樊籠間清夢繞巖壑豈不念白石好鍊五色紋獻之補天手歸卧山中雲寄呉朝錫小樓殘燭短冠服候晨鐘紫陌嘶羣驥丹霄駕六龍朝囘尋藥裹病起寫書封嵗月驚華髪松楸動慘容春雲懷去友夜雨夢歸農淮海經年别何時得爾從松澗亭澗上長松一百尺松花落澗流香雪仙韶入夜度晴空飛瀑隨風灑秋月髙人於此搆小亭上有雲氣山青青昨日客來覔琥珀旋汲清泉煮茯苓清江曲送宋尚徳自峽中囬清江水清峽水黄清江之上多緑楊浣花女兒立沙際青裙白足如秋霜蜀山雪消十日雨一夜扁舟欲齊樹兩岸猿聲不肻休送君流向峽州去題定子靜山陰草堂馬九霄為之篆扁草堂正在匡廬山山陰緑玉相對閒雲從雙劍峰前下潮到小孤江上還茶烟滿室寫墨竹花雨一簾觀白鷴誰似南宫能篆古為君髙置軒牕間春日駕幸鍾山應制大駕春晴臨寳地鍾山老翠擁金仙瑤花如雨三千界紫氣成龍五百年風送香烟浮衮服池涵樹影拂青天詞臣侍從何多幸安得詩才似湧泉飲楊亷夫拄頰樓時予奉命徵賢松江故有此作飛樓髙出市塵表萬丈文光照紫微洞仙曾與鐵為笛天女或裁霞作衣酒酣尚欲招鶴舞詩狂未可騎鯨歸休喚小瓊歌白雪自有玉簫吹落暉寄方壺道人海上神仙館天邊處士星卧雲歌酒徳對雨著茶經石洞龍嘘氣松巢鶴墜翎都將金玉句一一寫空青題枯枝寒禽王母宴歸西海上空留青鳥羽參差黄雲苦竹江南雪獨立寒條嵗晚時題水殿納凉圖湖上闌干百尺臺臺邊水殿倚雲開紅橋人隔荷花語玉盌金盤進雪來舟過黄陵廟黄陵廟下倚船牕水淺沙平屬玉雙山外斷雲寒日晚半篷殘雪下湘江入峽二首黄牛廟下水如弦白狗峽中數尺天百丈牽春上巴蜀巖花無數照江船歸州女兒採薪歸荷葉遮頭雨濕衣不怕山邊石路滑竹籃在背走如飛題桃花馬圖千載蟠桃花正新瑤池王母宴青春不知八駿歸來晚紅雨隨風落滿身題王子充琴邊秋興圖風泠泠兮木落山盤盤兮雲陰吾將鼓兮秋水誰能兮此心宋濓景濓金華人平江漢頌天命皇帝為億兆生民主旌麾所向悉臣悉庭初以一旅之師興濠泗間遂撫淮南平江東攻浙東西下之建都江左發政施仁戴白之叟垂髫之童涵泳神化皥皥熙熈如承平時號稱無事於時陳友諒㨿有江漢之地僭居大號賊殺其主飭修䝉衝虐驅烝黎如蹈水火不自度力又集蜂蟻之衆直窺豫章三月不解皇赫斯怒乃召羣臣於庭而告之曰陳虜不道敢屢予侮昔者蕩搖我邊陲侵軼我姑熟偵伺我金陵賴爾一二臣鄰之力攻而敗之予亦親覆其穴巢中宵竄奔假息武昌予不忍追殲之冀其悔禍以自逭於天刑癸卯之夏乃復圍我豫章是其㐫徳無厭自取殄滅此天亡之時天之明威予不敢不順唯爾熊羆之臣不貳心之士尚弼予以成厥功羣臣曰都於是右丞臣達叅知政事臣遇春帳前親兵都指揮使臣勝同知樞密院事臣永忠同知樞密院事臣通海備厥戎器簡厥師徒以俟七月癸酉皇躬擐甲胄禡纛龍江帥樓船數百蔽江而上陳虜大讋解圍而逃丁亥與我師遇鄱陽湖之康郎山戊子皇分舟師為十屯命達遇春永忠突入虜陣呼聲動天地矢鋒雨集砲聲雷鍧波濤起立飛火照耀百里之内水色盡赤焚溺死者動一二萬流屍如蟻滿望無際己丑焚偽平章舟刈戮餘二千辛卯復酣戰虜將張定邊素號梟猛皇親禦之將士皆死戰厯一二時遇春等左右夾擊殺士卒無算張中矢百餘而退潜保鞋山不敢吐氣我師亦移㨿湖口扼彼喉衿列栅南北江岸置火筏中流水陸嚴戒以候其發八月虜食盡遣船五百艘掠糧都昌又為大將所獲壬戌虜計窮冒死突出將上趨九江皇命諸舟一時俱合其大戰如戊子自辰達酉督戰益急友諒中飛矢斃於舟中癸亥降其衆五萬皇命釋之不戮一人凱歌而旋舳艫相衘旌旗飛翻不疾不馳委蛇而來萬姓驩迎俯伏道左山川草木皆有喜氣告廟飲至行賞論功賜遇春田若干永忠田若干其餘將士賚金繒有差臣稽在昔曹操治水軍八十萬來攻孫權而周瑜黄蓋敗之於赤壁苻堅發長安戎卒六十餘萬騎二十七萬以侵晉而謝𤣥謝石敗之於淝水然赤壁不過一焚而走淝水不過軍亂而奔初未嘗大戰也史臣且書之以為千古美談矧今湖口之㨗血戰累日天地為之晦冥日月為之無光河山為之震蕩其神功駿烈炳耀鏗鍧與天無極較之二國未足多讓而歌咏不作非甚闕典歟臣謹備著其事撰為頌辭一通以流鴻績於無窮以俟太史氏之采録云其辭曰天眷有徳實維哲皇肆其神略以靖寇攘義旗東指罔敢不恭風烈虎嘯雲游龍驤長淮既歸江左攸屬浙之東西樹侯置牧乃建國家以奠南服以安中原以控西蜀蠡爾小醜敢讎大邦集其兇頑鋒蝟斧螗輕涉我疆以跳以踉亦既剪劉僵骸覆江洊齊三軍直傾其穴釋而勿誅俾自懲刷闔胡不然復豕其咥翹其蟲臂當吾車轍皇用震怒厯告在􅒉是决不悛命將往征爾選舟師爾整甲兵爾漕糗糧各罄爾誠瑤光在申夷則之月禡牙江濱皇秉巨鉞以誓以戒以速其發紀律精明飊火奮激旟旐揚揚艂艭將將矛戈洸洸鎧胄明明載怒載厲載飛載揚雄威所吞己無荆湘既與虜逢大呼衝擊藥騰藜礮星流火㦸虐燄電奔巨轟雷劈殺氣冥䝉不辨咫尺矢鋒所貫什伍聨聨縱横交紐命隕弗顛攅桅湊颿筍束蝟編流屍塞川舟行弗前虜魄既褫扶創而逸聚於湖奥僅存喘息我方植栅江之南北火筏在流掩蔽如翼越厯四旬飛走塗窮將冒萬死以絶其衝我師見之萬艣如龍似之走而鷹之從酣戰六時申辰達酉僕姑一發殪此酋首貫睛及顱仆若枯栁大憝既除餘不能醜遞相告言我實不振我革我頑我歸至仁誰謂培塿可髙嶙峋再拜稽首來降來臣皇曰俞哉汝俘予受宥汝弗劉予汝父母汝寒予衣汝饑予哺昔何昏迷今始撤蔀奏凱而還騎吹欝揺形於樂歌節以鐲鐃飲至於廟頒賞於朝帛堆其家肉登其庖都人聚觀舉手加額或歎或謡有聲嘖嘖干戈相尋匪一朝夕自今昇平可坐而筴唯皇神武動則克之羣䇿盡屈四方式之惟皇寛慈降則釋之義聲渢渢疇能敵之惟皇明斷遇事即决洞見千里不隔一髪所以西征成此駿烈小大畢朝孰敢肆孽在昔赤壁洎乎合淝事以幸集尚傳册書紀兹之功俊偉赫熹揆古無譲可無歌詩臣雖㣲賤文字是職敢揚皇威并獻臣臆三代以還用仁興國皇宜遵行永作民極予奉詔總裁元史而故人操公琬實與纂修尋以病歸作詩序舊情見乎詞矣憶昔試藝時年丁二十九不諳精與觕運筆若揮帚欲盡王覇言自寅直窺酉於時有操君許子乃其友同自鄱陽來懷玉期一售風雅别正變卦畫参竒偶見者稱雙壁光芒射牕牖及至淡墨題氏名列某某果符人所占二榜皆冠首顧予坎􅇄姿甘在孫山後有司非冬烘懸鑑定妍醜終然采芑虋難可混稂莠盈盈羅刹江顔色緑勝酒忽然潮汐生龍虎共吟吼買舟踏澎湃共折江頭桞别歸金華山幸有雲半畆結茅澗之阿敢曰松桂誘尋鶴陟欹磴避人下關牡外物絶他縈中扄森獨守鑽摩六藝學誓以托不朽奈何荆楚間妖氣夜衝斗蔓延浙河東無地不深蹂帕額手執刀騎馬向林藪殺戮何忍聞流毒到鷄狗幸然一命存微賤不敵韭猶携舊書囊遑遑戴星走許子忽相逢短襦不掩肘涕下如綆縻容枯類羸叟稍稍叙離合即問君安否云君兵燹餘充腸乏藜糗念君五内熱談説不寘口何時挿兩翅執經趨左右大明麗中天流光照九有僭亂皆削平清净無纎垢垂衣坐法宫充耳施纊黈湛恩極霑霈天地同髙厚羣臣再拜跪齊上萬年壽帝曰元有史是非尚紛糅茍不亟刋修何以示悠乆宜簡岩穴臣學識當不茍衮斧嚴義例執茟來聴受使者行四方持檄盡蒐取非惟收譽髦最欲尊黄耉予時奉詔來君亦至鍾阜一見雙眼明不翅䝉發蔀大啟金匱藏一一共評剖發凡及幽㣲勝辨白與黝奈何君有疾客邪干氣母偃卧木榻間臚逆夜加嘔醫言濕熱勝良劑急攻掊恨無延年術𤣥霜和鬼臼日念芝山青親之若甥舅翩然賦式微使我心如灸傾欹車闕轅顛倒衫失紐若何慰勞勞吾誠嗟負負平生湖海情臨岐忍分手官樓沽酒别無錢更留綬醉後雙耳熱擊壺如擊缶汀草漲緑莎川花破紅藕須記送君時四月日丁丑浩懷漆園欲齊物伯陽期守𤣥修軌務絶絆沖志在濳淵夕隂冥蕙幌晨陽暖石田外膠一以遺澹泊返自然五圖非謬記九籥有真詮青青林間雨勃勃谷竇烟松花行將熟采之釀紅泉題胡博士嘉樹詩巻後花蕊峰前水滿溪溪南嘉樹可雲齊黃腴期鑄萬年魄青兕時遊九曲堤晴影落庭生逺思秋丹入葉愜新題似兹聳拔髙千仭憶昔封培始寸荑雨露華滋無上下書詩佳問到東西春酣碁響猿來下夜半琴鳴鳥失棲細字題詩盈玉軸當時操管盡金閨未論氣魄成曹謝但見光芒射斗奎大藥芳顔難乆駐西風迅景倍酸嘶有金莫鑄文園象無客能然照水犀所幸絺章存簡册便藏寶篋比懸黎顧予何意裁文錦乆客無言類木雞嘉䕃未瞻街作樾吐辭安得氣如霓角弓既有前人咏聊拾殘膏付小奚步虚詞五首同劉伯溫程邦民賦大梵凝神霄剛飈遡寥陽一氣上下通冲華結靈長五英迴黄旛清㽔起中央西若延顥氣東瓊羅翠薌遼遼宻宻間何從别圓方歘然欲上征斑龍為之襄虚皇降大庭肇自浩劫初六角垂赤文洞神流寶書龍節既開紀鴻靈悉受符藏之蕭臺中霆鬼翼以扶豁落七斗芒發洩兩曜樞天眞許度世稽首朝元都太霞凝真和緑璈隠玲瓏爟火浮朱陵虚霠肅淵宫紫壇升三成薄夕祠天宗帝一駕象輿八神儼來從綘節九靈旂衛以白玉童颯爾神響合元黄孰知蹤中天屹璇居寥廓俯帝青閶闔左右開銅龍巧承楹力士列兩觀呵衞執以兵曾颸自中啟八鸞相和鳴五畤凝天器幽泠辟陽精歗歌三洞章心與萬化冥七𤣥真皇君賚以五炁文龍泥入印紫金檢浮空溫曜羅鬱紅晶結鄰奠𤣥雯招招九天使飛葢隨飈輪三華吐明景敞朗夜炁分消搖大羅上同禮天中尊夏煜允中金陵人讀宋太史濳溪集混沌初刓太素斵挺生神人斷鼇膊剖乾割坤奠海嶽厥俗鴻荒人未覺帝命圖書出河洛奇耦生畫參伍錯煥乎斯文此其璞二三啟運乘飛躍典謨訓誥雅頌作黍離以降周室削天將尼父為木鐸乃芟詩書定禮樂乃作春秋明善惡紀羅萬象歸一勺放彌六合巻諸槖七十二子相唯諾才出中州氣渾朴及漢史記變矩矱西京雄健東京弱建安馬上詩横槊其音稍振氣已駁晉更六代轉銷鑠唐包九有復充斥至宋諸子雄相捔廬陵崛起超卓躒道州獨立承絶學後出新安最宏博有元將相皆沙漠往往南士登館閣從此斗牛氣磅礴乃挺竒才海東角蚤年脫穎何落魄貫穿經史探韜略出入佛老捜㝠漠鯨跳鼇抃鬬鮫鱷不持寸鐵徒手縛大弨射日孰能彍長劍倚天誰敢斫是乃浩然之氣擴簸弄元化筆在握星辰迸空如石落剛風立海大雨雹湧湍疊躍濤怒搏百怪倐忽光揮霍矯若魚龍舞瀺灂蔚若虎豹跳岝㠋飄若孤飛駕黄鶴勁若百鷙出元鶚鍧鏗大音振咸濩赫奕雄芒射干鏌迫而察之吁可愕注如懸河思不涸大田五穀當秋穫武庫衆寶開晨鑰左右而取非外攫遂造平坦鏟磽确淙淙安流宗大壑上尊𤣥酒殊澹泊東序天球匪雕琢自然光燄發葩蕚我時訪君即命酌春風蒲萄釀酥酪雪夜􅉊毺擁鼦䶅招月與友相酬酢月入尊中明可捉漱嚥醲郁棄糟粕此時豪縱脱矰繳吐竒抉怪安可約有烏如火天井絡掃除旬始銷格澤金箆刮目割翳膜郢斤斵鼻揮漫堊妙處神㑹不可度而我旁觀駭且怍如遇仙人授金藥一食生羽脱塵殻願為子弟請竒着先生忘言只大噱子亦歛衽逡巡却如此筆力扛鼎鑊不遇明主將焉泊聘以束帛加雙珏幅巾大布起林薄奏賦上林從楊柞豈比執㦸甘寂寞天王手按龍泉鍔大振天聲重開拓勢若新篁解春籜用爾圖像為丹艧用爾作樂為簫籥銘功頌徳軒寥廓日光月潔江漢濯前驅班馬鞭六駮後駕蘇歐驂兩駱千載而下宛如昨碌碌餘子徒齷齪傑哉先生果何若微子之裔散人託景濓其字大夫爵我作狂歌非用謔投以木瓜報芍藥哀孫炎垂老戎馬間相知復何有幼與孫炎交於今俱白首炎也雅好詩落魄惟耽酒醉中有神助不放持杯手才豪不受羈焉肻事田畝精勤脱穎出盤錯迎刀剖浪迹帝王州結交英俠藪喈喈朝陽桐濯濯新春栁南北暗兵塵妖星下天狗我皇入金陵一見顔色厚髙談天下計響若洪鐘叩即拜丞相掾奉身事明后再分太守符兼綰都官綬括蒼實重地豺虎白日吼皇曰汝孫炎其往總制某再拜謝不敏寵命敢虚受一年風俗淳二年民物阜三年逺人歸上表請官守文章曹劉亞政事龔黄右舊嵗過金華與炎適相偶寒燈夜半花春盤雪中韭終宴竟忘疲落月斜半卣臨别各上馬攬轡復立乆為言有小女離家方襁負今來已五周見父能認否未必到家期封書附姑舅置書篋笥間纔隔二月後墨色尚未乾語音猶在口胡為内變生失我平生友復恐是夢中仰天當户牖斗柄昏建辰月魄夕在酉乃知眞死矣慟哭吞聲嘔後聞遇害時扞刀落雙肘奮怒髪衝冠大罵血漂臼維時東南天彗出芒如帚滛滛苦雨愁熌熌驚電走魂兮早歸來空山不可狃我過孰與規我病誰云灸春酒釀薔薇奠子墳山缶西京七葉貂零落成草莽既有千載名焉用百年壽峨峨馮公巖與子同不朽康郎山奉㫖三軍戰罷日重輪好雨東來為洗塵絶壁秋聲清漱玉白沙月色爛堆銀氣成龍虎知王者兆應熊羆得老臣半夜内官催草檄燭花影裏繡衣新題杞上人所藏小畫太陰慘澹雷雨泣懸崖老樹蒼蛟立亂山鱗鬛雲氣寒石火迸出金流汁君不見老禪好畫如好色尺寸須酬萬金直何如天台㸔蒼石王禕子充金華人南康郡齋承恩紆郡紱服職効官箴秩厚幸粗給力孱非所任惟忻民訟簡恒恐吏議侵殘甿既摩撫宿蠧亦搜尋此邦乃名郡經變已年深荆榛猛獸處瓦礫悲蟲吟道院存故號公庭蔽荒陰前瞻彭蠡澤後揖匡廬岑緬懐昔朱子遺愛在人心往軌儻可踵吾將自兹今允載章生歸栝蒼賦詩贈别自我來金陵閲厯今十載取友日滋多雲萍揔湖海誰其最知心生也情藹藹若翁中丞公髙誼尤慷慨其量淵汪洋其器山􅐑峞起家本詩書致位今鼎鼐視予猶弟昆往往過期待古人不可見賴有若人在生能繼翁志愛我曷嘗怠寂寞旅邸中過從不嫌再晨游輒交申夜語恒到亥繼晷焚膏油引饌羞脯醢哦詩即成諧索紙不為賄生也姿甚良為學如築壘基固益加崇力勇那嬰痗窮經鈎隠微臨文絢光彩摛藻掞英華春空雲靉靆求教生實渴待問予則餒譬如處暗室何從視髙塏又如枯竹笻安足扶􅂒㞂坐此眞可慚生猶不予猥居然膠在漆逾久好逾倍兹焉舍我去契濶將無乃故山栝蒼蒼筍􅀢春可採臨清挹潺湲摘鮮收蓓蕾歸哉誠足誇類戰獲旋凱新憂固服期具慶須舞彩父書讀仍勤聖轍遵毋殆卒業究逺圖失學防後悔君子惜寸陰𤣥髪容易改我方墮踈慵長路媿駑駘此心獨生知盍亦匡不逮臨别傾巨觥聊用澆磊磊豈無别離淚肯效兒女洒宣室行召賈金臺正需隗重來倘有期話言勿予紿江花思漫漫贈别乏蘭茝短歌寫真情庻當珠一琲奉題王㑹圖自昔興王盛要荒敢後期梯航重九譯冠帶極羣夷執贄稱周貢來庭表漢儀紛然方物備各爾土風宜㲲罽交揮霍珊瑚競陸離象牙來赤徼犀角出黄支畢獻俱珍異咸懷係撫綏同人斯有象至治實維時紀事歸惇史圖形屬畫師睢盱眞髣髴駱驛互參差不藉良工筆誰窮異域姿千年觀盛際允矣在今兹題邊人雪獵圖天山十月雪如席千里平沙絶人蹟名王貴人擁騎来較獵合圍凌大磧馬馳閃電飛錦韀箭激流星響金鏑逐鹿驅熊勢轉雄揮旄揚幟光相射風號甌脱凱歌還日落穹廬塵暗息共誇意氣滿邉庭孰遣形容到中國單于犯塞彼何為左車臨陣眞無敵燕然勒石載勲名要復公侯笑談覔應上人自開先寺來訪因寫詩為贈上人以大慧普説石門樞要二書見示故及之匡阜東來路欲迷山風吹雪滿迦黎眼看玉峽雙龍出自伴雲松一鶴棲妙喜語言眞寶鑑寂音文字比金鎞荒城飛錫來相訪還笑當年限虎溪次韻答上清周道士山中一别五經春近得詩篇意度新文字須為方外友神仙元是世間人洞雲𤣥虎司丹室壇月青鸞禮玉宸坐對匡廬秋色好欲將寄逺苦無因郡齋偶賦宦况眞蕭索虚齋足晝眠思親懷愛日閱史記疑年白髮生愁後黄華立醉邊風流陶靖節輸爾早歸田雅頌正音巻一
