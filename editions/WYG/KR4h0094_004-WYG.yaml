  - {type: page-break, offset: 0, content: '', id: KR4h0094_WYG_004-1a, image: WYG1370/WYG1370-0614a.png}
body:
  text: 雅頌正音巻四明劉仔肩編黄肅子邕豫章人詠懷七首少壯好遊覽不知中道憂方兹懷故土眷此成淹畱員闕蔽朝暉𤣥雲陰以浮徘徊當永夕嬿婉將焉逑棲鳥翔不息鳴蟲亦啾啾人生無定止卒嵗何能休馬痩足力短士貧心志窮相如豈不偉滌器難為容憶昔擅詞賦左右能生風黄金資費用意氣自填胷迍邅勿復歎命達皆稱雄流水日夜流厚土胡不盈人生自不已四運有相承達士識物化昧者徒營營蕩蕩晨風來悠悠天宇清㑹當撥俗惡聊復從吾生追呼心所歡置酒坐中庭忘言勿復辯觴盡還復傾有酒既已飲兹愁仍復生何如長戚戚憂患有相并日月迭更代何能久安榮唯當委薄質允矣將微誠君心茍有察婉孌餘芳馨誰謂在咫尺邈若萬里程明明亮自適靡靡詎遑寧中園桃與李灼灼有竒花彼姝將折贈遐思在天涯此花傷夭折為歎女容華盛年難再遇豈得長修姱夫子新好合不能思故家欲因歌此曲此曲令人嗟匣鏡三十年塵暗不復治停飡且不寐所思知為誰逰子不復返眇在天一涯綻衣終當䋎道逺何能為明明天邉月三五入中閨念與子懽愛不得同光輝寤言相與共既覺將何依所適寡儔侣任性不自知輕心隘寰宇髙視誰能覊荏苒逾立年茫昧竟何為乃知聖賢語不離矩與規塊然枯朽質雕琢嗟良師白頭吟長絲弦聲緩短絲弦聲急長短苦不齊抱取向郎泣明明皓月三五圓缺念我所思中道而别噭噭雲中鴈北風聲烈烈願寄一行書與郎相訣絶泰山髙嵬嵬海水不見底妾心終不移研山枯海水短歌行來日苦少去日苦多人生不滿百痛當奈何當復奈何不如沽美酒置此髙堂上與君長笑歌峻坂無停車急川無停波不如沽美酒置此髙堂上與君長笑歌人生不滿百當復奈何痛當奈何來日苦少去日多長相思望歡城南頭覽取别時路路邊有深井井上有雙樹樹有東西枝枝葉盡相附去年東枝榮今年西枝悴年年望樹枝樹發行人歸仙人篇翩翩騎白鹿言上泰山頂俯觀浮世中不見百年影道逢古時人緑髮被兩領授我採藥訣延年保夀命我聞再拜跪問是何方求撫我挾我肘與我上天遊天上多桂樹枝葉何修修折取忽盈筥馨香霑我裘何因入君袖道路長悠悠李質文彬廣東人王臺驛亭子春去臺空迹已陳危亭傑出澗之濱清溪繞屋可濯足好鳥隔江如喚人明月委波金㶑灔青山帶雪玉嶙峋桃花流水非人世或有漁郎來問津和喻侍儀退朝韻玉笋班頭左掖傍叨陪鴛鷺接清光羨君藉藉青雲彦媿我蕭蕭白髮郎龍樓五鼔漏聲催暘谷寅賓日馭囘稽首九重天咫尺五雲低駕六龍來彤庭樂奏殿前歡侍宴歸來興未闌擬頌河清歌帝徳願言聖夀萬年安呉植子立嚴陵人寄孟兼張國録二首辟廱於樂地發軔稱竒瓌鐘鼔一朝饗冠帶如雲來横經闡聖謨稽古育羣材菁莪興詠歎奎璧煥昭囘皇情敷文徳昌運自天開抽毫贊鴻業明良何盛哉昔别意何長重來嵗華改沈憂誰與娯懷人邈江海褰裳渉汀洲秋風被蘭茝日夕零露繁芳馨為誰采嘉㑹諒難并良辰詎容待思君如明月夜夜望光彩劉汝弼還自海上相與談詩於玉兔泉之西齋如平生懽惜予有闗陜之行不得從容游衍賦此畱别羨子觀滄海歸來及素秋相從白下飲絶似洛中遊價重連城璧才誇五鳯樓明朝隔江漢相望兩悠悠畱别張孟兼故人昔隠仙華山髙卧白雲終日閒我攜清都緑玉杖相與嘯傲烟霞間一朝忽被徴書起姓名直入明光裏清時冠帶圜橋門濟濟横經臨璧水坐擁皋比三載餘石室仍紬太史書平生直氣横秋嶽秉筆一字誅奸䛕邇來峻擢儀曹上千載皇風迴揖讓要知制作魯諸生元是傳經舊劉向蹇予泉石是生涯白頭受薦來京華相逢共醉金陵市一官却種河陽花人生離㑹良可惜巳覺形容非昨日馬頭萬㸃蜀山青囘首秦淮烟樹夕丈夫才氣古所難去去有冠冠莫彈郫筒酒熟寧辭飲飯顆詩成得細看憐君最是知予者慷慨髙歌起中夜葛令丹砂或可求王喬飛舄還堪借他時一笑蓬萊巔碧桃亂發東風前還將玉管吹明月叶以雲間紫鳯篇題蘆花被圖秋風吟就蘆花被一落人間知幾年澤國烟波惟見畫詩翁毛骨久成仙髙情都付滄洲外舊夢長隨白鳥邊日暮江空轉晴雪至今惆悵釣魚船秋水軒秋水軒前秋水清美人曾此濯冠纓芙蓉隔檻零露夕鸂䳵滿汀殘照明洛浦佩環誰共解渚宫賦詠謾多情滄浪歌罷無人和何處蒹葭月又生過南湖戯折藕花秋日南湖戯採蓮鴛鴦飛上木蘭船一聲白紵知何處無復閒情似少年劉崧子高廬陵人題馬圖天馬西來掠西極萬闕躡雲入紫塞秋迴玉頰明黄河夜渡拳毛濕髙闕不敢騎拄策却立當前墀半垂絲韁齕青草明月闕鞍趂班早織女吟贈黄進賢憶昔束髮初嬌倚雲錦機折花事戯劇笑詫身上衣一從十五時學向機中織絲短愁苦長梭緩心轉急永夜蘭燈懸洞房門前梧葉零秋霜天寒手凍絲緒亂絡緯悲啼金井牀春花更疊黄金縷花底青鸞蹴烟霧東風何日天上來擬奉瑤池宴歌舞十日滿匹恒苦遲一夕停梭生網絲持刀沈吟剪秋水粉泪欲落愁風吹逺懐素心人邈在千里道何由托交歡持此永相保東鄰小姬昔同年至今盛飾為母憐幾囘月髙鳴杼軸正是他家夜彈曲雙翠軒詩為劉汝弼賦雙翠軒聞在鄱陽萬斛山下宫亭湖水之東偏疎牕碧户照雲日美人在望何娟娟問之此軒奚以名云有雙檜者乃是昔人手植之所成百年雨露見翹蔚萬井烽火遺崢嶸編氓父老共歎異摩娑重説當年事屋角仍瞻秀色闕更喜清隂庇宜爾劉氏賢子孫卜築闕幾千尺但見旌幢矗矗並立當髙門闕宿雙檜畔願親強健長相保闕憶我往年湖上過東望鄱山千翠螺闕明月正湧黄金波此時懷君雙闕訪仙島題詩逺寄軒中雲嵗宴端期拾瑤草秋夜紀夢美人遺我雲錦書問之所因吾故居章江千里波浪濶七月舟楫來何如書中字字光凌亂一讀中腸一囘轉青鳥西飛不可招凉月斜風動河漢秋夜詞林烏夜啼金井西蟋蟀在户聲相齊中天無雲白露下漸見梧桐青葉低幽居此時愁獨曉蘭燈雙照蛾睂小歌聲恐逐囘風髙掩抑冰絃破清悄絃中語咽心自傷低頭却看明月光羅衣一夜惜顔色庭草明日霑秋霜甘心霜下草祇在堦庭好不作白楊花飛飛洛陽道芳樹篇芳樹好容華深深映狹斜二月三月時千枝萬枝花夜舞留瓊佩春遊礙寶車折榮遺遠者含思獨咨嗟送周徳剛歸九江並柬其兄仲常君家伯仲才名盛賤子東南道路窮往昔永懐千里别只今謾想一樽同蒹葭水驛青鳬雨落木山城白鴈風嵗晏林居最相憶九江消息若為通秋林圖題贈曠伯逵迴風蕭蕭吹北林行雲冉冉生夕陰天寒雁去洲渚淨秋雨龍吟波浪深飄泊共憐今日興畫圖因見古人心幾時螺子青楓下深結茅堂更逺尋牛諒士良東平人秋林髙士圖林皋木葉下江潭秋水生靈飈蕩陰霧落景涵虚明手結芙蓉佩目送孤鴻征沖襟契𤣥賞招搖千古情淦泉詩為劉明善賦鄂渚通金滙枝江入漢流珠光宵射月雲液晝涵秋遠脈趨南紀靈源接上游潤分滋蕙浦香汎采蘋舟喬木承深澤名公屬舊遊觀瀾探妙理育徳繼前修浩蕩風雲㑹飛揚嵗月周使軺輝翥鷺鄉夢隔盟鷗酌泂詩方美投竿志未酬賜歸看晚節佩玉映芳洲畫梅梨花雲底路參差折得春風玉一枝南雪未消江月曉欲從何處寄相思紅梅隴頭人未來江南春幾許惆悵玉簫聲吹落胭脂雨顧觀利賓京口人挾彈圖􅆼窕雲生谷蕭條風滿林華裾因駐馬翠樾正鳴禽似亦尋幽致還能愜賞心明朝五陵道飛鞚落花深為卜者馮生題山居圖賣卜生涯薄心猶逃市朝欲歸盤谷隠不受小山招種樹環溪閣開門隔野橋桃花春水漲漁客毎停橈夜坐嘖嘖候蟲鳴噰噰寒雁過擊柝警荒戍然燈照孤坐風從林外來月向牕間墮悲歌清夜發激烈誰其和芙蓉野鴨圖欲採芙蓉寄逺情秋風江上錦為城閒愁總付東流水來看鳬鷖弄晚晴為袁一無題扇月中仙子種娑羅樹底遥山隔綘河吹落秋聲向何處紫篔牕户晚凉多秋院竹木小景庭柯日日減秋陰翠袖輕寒漸不禁拾得堦前大梧葉戯拈湘管寫微吟梨花睡鴨圖昔年家住太湖西常過呉興罨畫溪水閣筠簾春似海梨花影裏睡鳬鷖呉去疾字同安慶人春日雨中示友人二月已過三月臨茅堂寂寥常雨隂梅花白白落已盡楊栁青青渾未深何日新晴出山郭及時行樂稱春心應須載酒窮幽賞爛醉扶肩過竹林酬李卿李卿好客天下無日日相過惟酒徒眼花耳熱不復醉瓶罄樽空還復沽去年解后畱君第七日疎狂淹客途近有新詞來寄我灑然清興滿江湖除夕一暑一寒時又改相看相守過今年椒柈送酒來深夜銀燭開花向暮筵物色漸隨新節換老懷偏為舊時憐獨慚五鬼窮仍在虚有錢神論可傳徐尊生大年闕陵人佩刀行并序金華之永康有山曰雲巖拔起天半有巨舟藏壑中舟尾翹出如蠆一釘墜崖下野僧得之以遺張君孟兼孟兼製為佩刀銛利特甚尊生為作歌神人藏舟半天裏絶壑谽谺露舟尾錚然有物墮中宵八觚稜嶒長尺咫野僧拾之歸張公化為夭矯蒼精龍不知何世何年閟竒氣剸犀斷虎一旦生神通魑魅却走妖邪空張公佩到蓬萊殿天上羣仙驚未見青絲縧懸白玉環當晝孤光搖冷電為君淬厲向盤根縱有青萍何足羨他年辭榮歸浙山莫行金華赤松間精靈感㑹霹靂響便恐飛去無時還呉雲友雲義興人題魏仲逺見山樓百尺樓居盡日開四圍山色送青來平湖霽雨鷗波靜畫棟春風燕子囘天末烟霞連海岱座中賓客對蓬萊登臨豈特如王粲擬欲披雲接上台送李民瞻侍郎宣諭陜西侍郎將命出金鑾一路傳呼遠近懽闗内官曹迎使節秦中父老識衣冠雲開太華三峯秀水遶黄河九曲寒寄語渭川千畝竹西風還解報平安題闕送别圖江山天共遠無限别離情人去長亭在空餘落鴈聲秋夜二絶句中秋不見月相思情未絶倦對讀書燈風來自吹滅寒光滿天上明月在水中照我雙塘蓮葉葉生秋風鄭沂叔魯姑蘇人題安慶府城樓髙閣崔嵬倚碧空五雲深處望江東勢牟太華羣山伏地壓長淮亘古雄桂子影團千里月梅花聲斷五更風從今鐘鼔分明聽過客爭誇太守功至淞江路入雲間去青雲上錦袍水連三泖濶山擁九峰髙白鶴嗟何及鱸魚興亦豪淒凉千載事釃酒向亭皋題山居圖杜陵西上浣花莊茅屋低低在石傍最是可人三月節一山春雨茯苓香呉伯宗字同金谿人賦得羅漢洞送陳宗進歸㑹稽古洞根石壁嵌空隠崔嵬聞昔有異人拄杖曾一來靈跡已緬邈洞門閉青苔枯木寒未花千年待誰開屬兹休明運百里紆良才徳星麗中天移影照蒼厓鸞鳯詎棲枳覽輝謾徘徊早見丹穴雛志欲淩九垓定省方繾綣歸期忽相催還轅過湖口驛路隨縈迴吾知青雲興却繞蓮花臺風髙墜落木嵗晏舒寒梅明登㑹稽頂想像遊天台臨期重囘首兩地心悠哉題李氏棲碧樓唐有謫仙人風骨特髙妙晚愛棲碧山閒心付登眺桃花與流水目擊領其要遐觀窮有象幽討入無徼不知誰相問但覺遺一笑聲落天地間松風紫鸞呌諸孫企髙躅異世頗同調瓊樓梯空青銀榜生光耀予亦愛其人臨風劃長嘯余氏山南小隠萬疊碧山紆維南好隠居竹深清野濶林響夜牕虚古巷多囘轍匡床剰貯書忽聞歌調起白石意何如周子諒字同廬陵人讀子書作學館坐無事故書聊復看披文既薈蕞尋義亦泮渙趨前後已逸顧舊新輒竄萬言雖畢陳一理竟未貫往往未終巻心目已憒亂置書歛視聽境地甚澄晏易書詩春秋辭簡義亦煥聃書言五千隠約可徐玩奈何百家言磊磊疊几案綿延比葛藟根遠益纏絆遂令矜名士摹放如習幻雕刳出葩卉綴緝呈組纂悦目效女美飫口匪芻豢推以合身心宜若霄壤判吾欲盡其文掇取歸爐炭觀心勝觀書矹矹坐夜旦濯穢來澄清磨昏出璀璨綿綿春雲舒炯炯秋月爛詠歌成文章昭倬比雲漢往者予弗及來者予何憚作詩示朋曹無乃駭童丱贈别郭元達二首時雨布嘉澤林塘有餘清端居方自怡子有千里行問子行何為豈縁好爵嬰守道以時動所念在蒼生風雲浩茫茫山海日震驚撥亂需大猷寧徒阻甲兵溫溫國之良蘊義富且精髙歌起林莽抗議登明廷勿懐一身計勉樹千載名娖娖中林下小亷何足稱黄鵠乘天風飄飄忽髙翔飛飛巢林鳥刷羽情内傷豈無淩霄志六翮不得長念子平生意相送以徬徨勿言易為别明發各一方悲來解佩劒為子復進觴且為遊子歌歌詞何慨慷疾風吹征颿旭日在衣裳自古有離别各言慎行藏白紵詞井梧墜葉聲如雨轆轤夜靜莎雞語西里佳人怨薄寒惆悵燈前歌白紵白紵新時白若霜象牀開合秋水光製成只恐香塵汚衣著偏宜九夏凉西風乍入羅幃裏數㸃清塵不禁洗競開篋笥試新紈舊服抛捐那復理嗟爾白紵怨勿深憐新棄舊他人心願將貞白永相保今年巻却明年討秋風詞秋風乍髙江葉飛秋水欲落江聲微誰家寒事促砧杵别館清霜侵客衣旅遊漸倦黑貂敝鄉信不來南鴈稀秋江搖落人當歸秋江搖落人當歸戈鎬仲京鎮江人桐孫曲崑山玉軫蒼梧雲膠弦漆水生古春垂楊飛絲小鶯舞海上桃花響紅雨仙人鸞尾掃寒空環珮行烟度湘浦驚猿墜石秋雲裂鐵網珊瑚碎明月臨卭病客看文君鬢影星星半成雪渌水詞紅船壓秋緑水澀藕根香昨夜龍沙月鴛鴦夢薄霜秋彎掃蛾翠生色染絲黄為報潯陽客行雲不下堂送陳伯淵教授歸沔陽廣文金閨身臺城一相見壁素懸青燈花蟲蠧書巻去買沔陽船抽帆上秋水别路折垂楊歌聲斷腸起花落烟江口青苧新槽酒索寞辭官資還家奉眉夀春曉詞鴉啼細栁東方明井上轆轤牽水聲花奴滿堂開翠屏銀爐燒麝素烟輕西原落落秦川路白馬花鞭幾時去落花昨夜飛成團蝴蝶歸來及春暮菖蒲詩溪毛剪雨森森玉細葉鋪香晚花緑崑山石筍瘦如龍銀沙九節種春叢髙堂坐客青雲氣鳯羽翹烟散花机莫教秋質易闌珊日日銅瓶換芳水寄劉彦炳征斾遙分苑路西馬蹄春去弋陽溪相思欲和烏啼曲一拂瑤弦意總迷題野塘秋景芙蓉秋色滿銀塘白鷺雙飛下晚凉記得採蓮看越女醉騎驕馬映垂楊王敬中字同四明人送商公禮赴溫州城東飛花㸃客舟花間春雨啼鈎輈風塵顧我獨青眼湖海送君俱黑頭容成洞口明月好白沙渡傍蒼樹愁雲山在望五百里何日相從汗漫遊南湖齋居寄友人山寒夜透青綾被海日朝明白玉珂隠几不知春色晚停杯驚見落花多旃檀香裏來僧梵楊栁橋邉起棹歌咫尺湖光不相見竹牀琴調近如何贈友赴廣州烏府才華爾最賢北風又上孝亷船篋書尚有陳琳檄行李那無子敬氊帆影曉分湘浦月珮聲晴拂隠山烟壯遊萬里須乘興好著聲名到日邊僧似杞楚材鄱陽人寄題劉氏雙翠軒兩株擁秀立階除絶勝蘭苕畫不如晝影並移當几席嵐光相與落圖書羽衣霓袖臨風舞鴉髻雲鬟帶曉梳珍重二難孤未得更栽連理伴幽居題米元暉山水小景贈陳原貞别江頭雨足春水生江上青山烟樹暮扁舟明發去如飛目斷征㠶入蒼霧僧來復見心豫章人車駕臨蔣山於崇禧寺賜髙僧齋議設無遮㑹謾成口號二首崇禧寺前風日清鑾輿遙迓定鐘鳴山林有道裨王化天地無私荷聖情婁約入梁終應詔恵琳居宋豈貪名金山重感千年夢願濟幽靈答治平祗園花雨曉吹香手綰袈裟近御牀闕下紫雲隨雉尾座間紅日動龍光金盤蘇合頒殊域玉盌醍醐出尚方稠疊屢承天上供每慙無徳頌陶唐桂隱為日東楚上人賦上人種得桂扶疎好似淮南隐者廬金粟滿林秋富貴碧藂漙露夜清虛月中子落翻經後風外香飄起定初掛錫榑桑看秋色虚遊絶勝廣寒居同朝天宫道士朝囘口號羽仙飛佩曉泠風禪子金襴映日紅共祝太平朝帝闕蓬萊兠率五雲中午隂初轉御橋灣齋退從容出九闗天上好風重送喜鑾輿明日幸鍾山僧宗泐季潭天台人江南曲泛舟出晴溪溪迴抱山轉欲採芙蓉花亭亭秋水遠心非檣上帆隨風豈舒巻但得紅芳遲何辭嵗年晚送瀾法師歸雲門故山從此去何日更相逢獨倚千峰閣閒聽六寺鐘石林流水繞蘿徑落花封㑹有東歸興來尋雲外蹤朝來朝來暑氣清疎雨過簷楹徑竹欹斜處山禽一兩聲閒情聊自適幽事與誰評几上玲瓏石青蒲細細生贈日本僧海外趁商船江東住幾年華音雖已習鄉信若為傳一鉢隨時飯諸山到處禪凉秋明月夜夢渡石橋烟道中青石懸蘿花羃羃緑田分磵水泠泠人家深住黄􅆐塢漁網髙張白鷺汀僧廷俊用章鄱陽人次孟天暐南山雜韻二首南湖三月水如天共愛風流賀監船若道沃洲還可買數椽髙卧白雲邊日上南山春霧開雨餘鏡水緑如苔風流賀老今塵土短棹何人載酒來僧懷渭清逺豫章人畫梅二首瑤臺夕承月玉砌曉凝霜花映含章發枝横禁籞長春風似相識偏惜壽陽粧折得江南春悵望洛陽客悠悠嵗年暮浩浩風塵隔道遠勿相思相思減容色次孟天暐雜詠二首賀監湖邊草色春秦淮江上栁條新山川是處堪行樂晴日風光思殺人暮春三月風日妍亂折花枝送酒船西嶺山光青浸水南池栁色緑生烟僧子楩用堂四明人思親憶别長汀十二秋羇孤江左謾增憂寒蒲雨足橋南浦新筍春生舍北丘破衲一身雲渺渺寸心千里水悠悠鄉書莫寄天南鴈堂上慈親已白頭雅頌正音巻四
