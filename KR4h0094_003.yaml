body:
  text: 雅頌正音卷三明劉仔肩編危素太樸臨川人輓達兼善大將忠精貫白日諸生攬涕讀哀詞天胡不隕楊行密公恨不為張伯儀滿眼陸梁皆小醜甘心一死是男兒要知汗竹留芳日只在孤舟淺水時題營丘山房太岳流芳裔何年徙贑州殊勲思尚父作室表營丘故國兵戈後空山草木秋穆陵闗北路風雪近曾遊南京别王道士秦淮卧病惜春陰訪問深知故舊心千里家鄉漸投老雲山爛漫許相尋孟昉天偉北平人十二月樂詞并引凡文章之有韻者皆可歌也第時有升降言有雅俗調有古今聲有清濁原其所自無非發人心之和非六徳之外别有一律吕也漢魏晉宋之有樂府人多不能曉唐始有詞而宋因之其知之者亦罕見其人焉今之歌曲比於古詞有名同而言簡者時復亦有與古相同者此皆世變之所致非固求異乖諸古而強合於今也使今之曲歌於古猶古之曲也古之詞歌於今猶今之詞也其所以和人之心養性情者奚古今之異哉先哲有言今之樂猶古之樂不其然歟嘗讀李長吉十二月樂詞其意新而不蹈襲句麗而不慆滛長短不一音節亦異旁遘㝠思朝涵夕詠諧五聲以攤其腔和八音以符其調尋繹日久竟無所得遂輟其學以待知音者出而予承其教焉因增損其語而隠括為天淨沙如其首數不惟於尊席之間便於宛轉之喉且以發長吉之蘊藉使不掩其聲者慎勿曰侮賢者之言云上樓迎得春歸暗黄着栁依依弄野輕寒似水錦牀鴛被夢囘初日遲遲勞勞胡燕酣春逗烟薇帳生塵蛾髻佳人痩損暖雲如困不堪起舞緗裙夾城曲水飄香掃蛾雲髻新粧落盡棃花欲賞不勝惆悵東風縈損柔腸依㣲香雨青氛金塘閒水生蘋數㸃殘芳墮粉緑莎輕襯月明空照黄昏鉛華水汲青尊含風輕縠虚門舞困腮融汗粉翠羅香潤鴛鴦扇織迴文疎疎拂栁生裁炎炎紅鏡初開暑困天低寡色火輪飛蓋暉暉日上蓬萊星依雲渚濺濺露零玉液涓涓寶砌衰蘭剪剪碧天如練光搖北斗闌干呉姬鬢擁雙鴉玉人夢裏歸家風弄虚簷鐵馬天髙露下月明丹桂生華雞鳴曉色瓏璁鴉啼金井梧桐月墜莖寒露湧廣寒霜重方池冷悴芙蓉玉壺銀箭難傾缸花凝笑幽明霜碎虚庭月冷繡幃人靜夜長鴛夢難成髙城迴冷嚴光白天碎墮瓊芳髙飲撾鍾日賞流蘇金帳瑣牕睡殺鴛鴦日光灑灑生紅瓊葩碎碎迷空寒夜漫漫漏永串銷金鳯獸爐香靄春融七十二候環催葭灰玉琯重飛莫道光陰似水羲和迂轡金鞭嬾着龍媒張以寧志道莆田人賦段節婦莫磨青銅鏡莫理冰絲絃黄鵠不重行女貞難再妍嗟嗟未亡人寂寂長自憐百死何足惜但惜負所天嫁時舊巾櫛不忍棄且捐所天諒有知攜之見黄泉送鄉友君家重峰下我家大溪頭君家門前水我家門前流我行久别家思憶故鄉水况乃故鄉人相見六千里十年在揚州五年在京城不見故鄉人見君難為情見君情尚爾别君奈何許送君遽不堪憶君良獨苦君歸過溪上為問水中魚别時魚尾赤别後今何如春暉堂詩上天生萬彚何物能報之所以古孝子感兹蓼莪詩况母紅芳年手提黄口兒獨於霜雪際迴此陽春熈昔為斷蓬根今如芳蘭枝母恩雖莫報子職當何為願將一寸草化作傾陽葵上以承君寵下以報母慈奉使安南國出都門作大隱金門三十載幾囘馬上聽朝雞如今一吐虹霓志萬里交州入馬蹄林公慶孟善栝蒼人賦得明月樓贈孫伯融兩溪合流涵太虚白龍簸弄摩尼珠玉娥捧盤不敢去孚尹散入仙人居仙人乘雲遊汗漫瓊簫寥寥度銀漢斟酌北斗依上台玉宇珠宫露如霰鳯臺神馭不可留春風花開帝王州夫容峰前舊時月夜夜長照溪上樓長沙三絶句定王臺上闗中土西望長安多白雲賈誼才髙空有賦河間博雅更無聞太傅兒孫多濟美東陽絳灌少聞家欲尋遺井無人識蛺蝶飛來薺菜花岳麓道林何處是郡人遥指水西村儒宫佛寺俱無迹竹樹如麻暮雨昏程國儒邦民鄱陽人客新安用欒秉徳韻溪頭新雨水潺潺行役寧消半日閒棧影連雲通五嶺柝聲和月出三闗官營白酒初成市客舍黄塵不見山撫景豈勝懷古意盡言天道似循環凃穎叔良豫章人送董太祝赴濠州漢祖起豐沛唐公興晉陽方今堯舜聖肇迹自濠梁葱鬱佳氣集紛紜才傑良旌旗歘南渡奄有呉楚疆淮海何漫漫荆山獨蒼蒼分符重牧守組綬出明光朱轓翼五馬白日曜周行綏緝知有道懷柔喜多方仁風日以洽桑梓宛相望戚畹車蓋盛侯家珠繡香從知湯沐邑歌頌聿昭彰嘆我愚朴士忝班聫奉常迴翔玉闕下白髪愧疎狂典禮懼深曠祝釐誠允臧分攜詎忍别撫劔苦増傷亹亹文運泰輝輝天業昌恭期樹佳政遺恵流帝鄉遂令千載下奚啻比龔黄送張助教之淮安參謀長淮據天險南北當要衝職方既已定分閫鎮兵戎時君奉詔往參佐理從容爰投定逺筆鞍馬如飛龍大將開國舊英氣生霓虹髙談濟時略魚水相和同擊楫祖生志草檄陳琳工折衝樽俎間庶以樹竒功吾聞中原地逐鹿角羣雄先當逺斥堠一掃烟塵空勒銘燕然石早掛天山弓歸來朝明主賞賚恩數隆顧視迂濶士不啻秋生蓬壯哉從軍行頗有前賢風長揖别京闕分攜苦匆匆逺樹引旌節飛雲送艨艟邉城並大海四境無驚烽轅門有餘暇書札寄來鴻送王典籤南豐同知聖主龍飛日登庸選俊良大廷興禮樂列牧重符章贊理須才傑謀猷布紀綱講筵承詔㫖驛候戒舟航道里通盱姥風謡逮粤疆政期均賦役恩恃恤逃亡麥秀聞歌頌桑隂見冶粧閭閻豐五袴稿秸送千箱增秩知多喜施仁願有方自能紓睿眷真足致時康海日輝輝白江雲冉冉黄分襟嗟欲别看劔興尤長子固遺文在麻姑舊醞香相思天北極還想接鵷行送劉典籤赴徐别駕彭城古要地襟帶控河流雲飛芒碭野天近岱山陬生俗喜驍暴干戈輒相仇爰從楚漢後英氣鬱難休聖代暢炎運恩威聞九州徐方既賓服民物在懷柔通守任賢徳贊襄敷令猷蘭臺輟文彦遄征自無留鼔棹出淮海前旌駐鴻溝招徠省耕稼凋瘵庶云瘳仁化被邉鄙淵藪畢來投坐看河洛外指掌可旋收分濶車輦下深情苦悠悠同鄉復同館寂寞恒相求臨岐莫可贈舉觴復能酬惟瞻豐城劍龍氣夜中浮送友還上清復往旴江并柬呉伯度方壺子康樂好山水子長躭逺遊陶潛歸故里范蠡泛扁舟四子趣向異俱諧心所投知君亦瀟灑文采重天球曳裾輦轂下富貴復何求引棹忽長往飄然若風休丹崖覔鬼谷龍虎氣雙浮團團桂樹緑厯覽舊山幽旴姥逺相待麻姑居上頭紅泉映緑澗𤣥醴注清秋還要方壺老復約延陵侯脱屣塵世外懷珍比前修祗恐明詔下𤣥纁賁林丘烟霞席未暖來覲帝王州秋夜和黄典籤遥夜天宇逈開軒坐前楹月華臨水動凉風滿庭生屢惜光景至悟兹塵慮清疎星明玉闕委露浥金莖流序倐將邁嘉朋紛逺征徴才旅羣彦鳴珮集玉京文詞資麗澤笙磬感同聲非比江湖客馳心摇懸旌酬鄒伯謙見寄白髪蕭踈忝侍儀夔龍青瑣許追隨禁廬晚退仍分直宣室春來屢祝釐翔燕逺過雙玉闕流鸎深囀萬年枝老懷寥寂將何補自有雲泉入夢思劉丞直宗弼章貢人讌章光逺宅薄暮沐時雨淩朝陟崇山洩雲去復來流水清且閒褰裳俯茅屋髙論激晴瀾層軒既顯敞好鳥鳴間闗開樽意殊樂劇飲未言還何當脱塵鞅共卧青松間詠蘭得詠字春陽麗空谷幽花被芳逕葳蕤浥露光蕭散迎風勁質非荃蕙變根與松桂競錫夢瑞先兆紉佩香逾近亦欲搆新亭於焉樂觴詠賦落花以宋元憲金谷樓危到地香得香字英華本天性開謝任年光自是春風改那因夜雨傷低迴飄綺席荏苒度雕牆翠霧當牕合紅雲匝地香㸃泥登燕壘添蜜入蜂房剪綵誇西苑成粧詫夀陽角哀番塞曲逕逺誤漁郎但使靈根在重看錦樹芳髙齋宴集得枯字華燈明别館綵月度平湖簪盍欣聨璧杯行類貫珠交情過管鮑文藻繼楊盧梁苑遊堪並蘭亭興不殊舞迴香篆裊詩就燭花枯共惜芳春好焉知清夜徂九日東林寺燕集以來把菊花枝分得把字季秋屆良辰文宴集蘭若杯行樂酬勸墨妙競揮灑坐令干戈際頓使懷抱寫感昔生逺思登髙睇平野風流緬龍山雄豪追戱馬采采東籬花何由未盈把秋日東林宴坐髙秋坐虚館颯然神慮清迴飈颺踈雨瀟灑集前楹始欣塵雜逺稍覺微凉生簷鐸遞相答林蟬時一鳴物情各有適吾生豈無營采石蛾睂亭昔從淮海泛歸舟曾為蛾眉十日留翠袖雁行歌子夜玉壺鯨飲醉清秋江山有待仍青眼嵗月無情易白頭滿目閒愁懷李謝數聲漁唱起滄洲金山寺孤峰宛若巨鼇簮横絶中流翠色深勢與波濤相上下影隨魚鳥共浮沈椒門風起雲翻墨瓜步潮囘月湧金擬汲中澪觀瘞鶴維舟三日阻登臨題髙麗貢使還巻大明天子混華戎又報三韓使節通錫命新頒如斗印歸帆穏駕落燈風衣冠復覩唐人制樓櫓何煩漢將功翹首金陵天咫尺扶桑日上五雲紅文軌初同泰運開藩邦傳令動雲雷三韓舊控元菟險重譯今隨白雉來使節秋風辭殿陛樓船春水泛蓬萊金章珠翟承殊渥專對從知得俊才題徐唐臣畫招提隠翠微一逕入林霏松風清麈尾雲影落銖衣翛然絶塵想日暮澹忘歸遙空度雲影髙樹臨清流鬱鬱千嶂暝蕭蕭羣籟秋援琴坐磐石或恐是巢由同俞自安泛舟南湖寄龔所立髙秋留别墅亭午泛寒流未結巢由社還同李郭舟波光迎日動雲氣挾山浮為問乘槎客何時賦遠遊題孫子讓山水斜日在松杉千崖暝色酣山藏五桞宅路轉百花潭亂石明蒼玉遙峰露碧簪終希陪妙躅來此脱征驂題湘中袁氏先隴瑞芝巻湘水清無底湘山髙入雲曾聞三秀草表瑞百年墳馬鬛瓊光覆牛眠紫氣分兵戈嗟阻隔春雨長榆枌題鮑典籤芳塢隠居圖幽勝似仙家緣雲石磴斜陰崖留積雪晴樹亂明霞寺逺時聞磬溪深未沒槎抱琴來谷口多是識桃花北極院紫霞樓危構憑虚切太清紫霞如綺散前楹萬年佳氣通函谷五夜神光動赤城鶴駕淩風霓斾遠鳯笙吹月羽衣輕崆峒對靣三千丈我欲因之問廣成題陳氏中靜軒為愛城東處士家竹門藤巷寂無譁清溪時集忘機鳥喬木來巢返哺鴉牕下晨香燒栢子甕頭春酒釀松花年來我亦嫌紛擾擬卜南鄰度嵗華過舒州弔青陽余先生指揮戎馬駐江瀕南紀安危寄一身闔室同歸追李芾孤城百戰繼張廵河山莫誓勲庸盛金石徒傳翰墨新漂泊風塵愧何似空餘涕淚滿衣巾除夕分韻得馬字嵗事聿云徂年華浩如寫良宵集黌宇文宴盛儒雅絳蠟搖夕輝清醑溢春斚聯詩效韓孟摛藻軼揚馬歡樂詎終極襟懷共瀟灑明發慶始和相期錫純嘏熊鼎伯穎臨川人題營丘山房築居臨貢水攬勝擬齊封燕翼當時計鷹揚百世宗喬林空翠濕華屋曉雲重預卜非熊兆多應晚嵗逢題江岫圖雪渚水初生寒雲落雁聲片帆天共逺南望總闗情呉彤文明臨川人峽口晚泊四首川路渺無際揚帆遡流波征人嘆遲暮舟子方笑歌去去日將夕維舟松上蘿坐嘯微雨歇洲渚落花多翠壁隠殘照滄洲生夕陰鷗鳥忽飛去幽幽春水深渉險念先訓觀風推聖心功名覺遲暮蕭颯二毛侵日落潭水緑松間聞子規征途一萬里江月毎相隨王事有程度人心多嶮巇周詢庶有濟驅涉不知疲江烟歛初夕華月入我舟坐久風露集微寒侵敝裘戍鼔動邉思櫂歌縈客愁漸聞湍響急度峽是歸州蘭以權世衡西河人題東峰驛用梁郎中韻香浮緑蟻山中醅磁甌逺勝清蓮杯不用笙竽為佐酒松風一派從天來半酣走筆寫新句飛龍滿壁真雄哉故人騎鶴幾時去空庭寂寂官梅開題越上人臨清軒塵境不可居飛錫傍流水髙檻接空溟新緑渙如砥孤影過寒鴻悠然逝羣鯉所以川上人於焉契斯理卜築擬幽棲兼足浣塵耳愛此春雨餘波光淨禪几題劉郎中雲海蓬萊軒誰信劉郎是謫仙行軒不減洞中天蛟龍嘘氣成樓閣島嶼無波見市㕓鶴到詩壇通逺信人看棋局惜流年卜居自愛三山好贏得烟波滿目前酬寶秀才旅宿三秋依古寺御溝斜月似秦淮欲慿征雁傳鄉信却厭鳴蛩感客懷剪燭且為談磊落敲棋還可助俳諧休嗟行篋空如洗猶有黄金半股釵延碩上人村深無客到今日喜公來卓錫當松逕談禪坐石臺晴看江鷺浴暖愛野梅開休笑無清供溪頭水一杯張紳士行齊郡人題畫二首髙樹漏疎雨滴瀝下銀塘美人捲簾坐銀鴨自添香風吹緑荷葉正見宿鴛鴦閒門緑樹老華池芳草生偶隨蝴蝶起獨自下階行何處垂楊院春風驕馬鳴湖中玩月銀波千頃照神州此夕人間别是秋地與樓臺相上下天隨星斗共沈浮一塵不向空中住萬象都於物外求醉吸清華遊碧落更於何處覔瀛洲送勤上人歸靈鷲山靈鷲禪房我所思可堪春晚送勤師亂山啼鳥烟霞裏一路落花風雨時定有猿看牕外果應知苔䕶壁間詩門前有徑通三竺欲向中天採石芝題江岫圖烏衣巷裏東風老蝴蝶飛來滿芳草美人春夢隔天涯十二巫山眉不掃巫山巫峽江水新烟波𣺌𣺌江南春鴛鴦不識横塘路鸚鵡牕間呼向人青燈誰共官曹宿雪楮雲毫吮晴緑太常春甕碧霞沉六曲屏風對銀燭楊翮文舉金陵人酬孔秀才達人樂髙蹈寒士躭逺遊逺遊欲何之禦冬無重裘栖栖道路間四顧誰與謀溫言忽相慰慶愜復焉求三復緇衣詩調髙安能酬薄言寫心曲終覺懷慚羞春遊次韻白日諒難羇流光遽侵尋春風萬餘里觸景愁我心出門將何之髙步凌嶇嶔纍纍丘塚間古木殊陰森昔賢日已逺朱瑟尚遺音千秋百嵗後有酒不可斟傷哉雍門語感之淚霑襟榮名安足羨行樂須在今夙興聽鴻鴈嗷嗷尚哀吟遊廣教寺次李生韻勝日欵禪宫蒼苔印屐蹤雲間聞梵語烟外聽齋鐘樹列千年檜林深百尺松明珠光錯落幽壑舞驪龍題徐熈桃花鸚鵡圖海上紅雲日日新碧鸞無夢識芳塵金籠不鎖閒鸚鵡占得東風一段春題李得瞻壁間相看不厭圖牕前圖畫勝𤣥闗怪石長松九夏寒寄語山靈休厭客清風明月好相看寄于清叔二首暖沁香篝宿火溫綘紗紅燭照黄昏自憐不廢千金夜帳底吹笙倒玉樽梅花亂落雪紛紛兩袖東風酒半醺春月滿堂歌舞散髙情渾欲夢梨雲雅頌正音巻三
